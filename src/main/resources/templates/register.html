<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/auth.css}" rel="stylesheet" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"></div>
      <div class="h3 m-0 fw-bold">校圈</div>
      <div class="mt-1 text-center" style="color: rgba(11,18,32,0.6); font-size: 14px;">
        快速创建你的账号
      </div>
    </div>

    <div class="auth-title h4">创建账号</div>

    <div id="authMsg" class="alert d-none" role="alert"></div>

    <form id="registerForm" method="post" action="javascript:void(0);">
      <div class="mb-3">
        <label for="username" class="form-label">用户名</label>
        <input id="username" name="username" type="text" class="form-control auth-input"
               placeholder="请输入用户名" autocomplete="username" required />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">设置密码</label>
        <input id="password" name="password" type="password" class="form-control auth-input"
               placeholder="至少6位" autocomplete="new-password" required />
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">确认密码</label>
        <input id="confirmPassword" name="confirmPassword" type="password" class="form-control auth-input"
               placeholder="再次输入密码" autocomplete="new-password" required />
      </div>

      <button type="submit" class="btn btn-primary w-100 auth-btn">注册</button>

      <div class="auth-links">
        <a th:href="@{/login}">已有账号？立即登录</a>
      </div>

      <div class="auth-footer">
        注册即表示同意服务条款
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    const form = document.getElementById('registerForm');
    const msg = document.getElementById('authMsg');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const confirmEl = document.getElementById('confirmPassword');

    const setMsg = (text, type) => {
      msg.className = 'alert d-block alert-' + type;
      msg.textContent = text;
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      const confirmPassword = confirmEl.value;

      if (!username) return setMsg('用户名不能为空', 'danger');
      if (!password || password.length < 6) return setMsg('密码长度至少为 6 位', 'danger');
      if (password !== confirmPassword) return setMsg('两次输入的密码不一致', 'danger');

      try {
        const res = await fetch('/user/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await res.json().catch(() => null);

        if (result && result.code === 200) {
          setMsg('注册成功，即将跳转到登录页...', 'success');
          setTimeout(() => location.href = '/login', 800);
        } else {
          setMsg((result && result.message) ? result.message : '注册失败', 'danger');
        }
      } catch (error) {
        setMsg('请求失败，请稍后重试', 'danger');
      }
    });
  })();
</script>
</body>
</html>
