<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注册 - 校圈</title>
  <link th:href="@{/css/login-modern.css}" rel="stylesheet" />
</head>
<body>
  <div class="page-shell">
    <header class="top-header">
      <div class="brand-wrap">
        <div class="brand-logo-frame" aria-label="校圈Logo">
          <img th:src="@{/logo.png}" src="/logo.png" alt="校圈Logo" />
        </div>
        <div class="brand-text-group">
          <span class="brand-school">中国地质大学</span>
          <span class="brand-divider" aria-hidden="true"></span>
          <span class="brand-system">中国地质大学（武汉）校园虎扑登陆系统1.0</span>
        </div>
      </div>
      <a href="#" id="langLink" class="lang-link">English</a>
    </header>

    <main class="hero-main">
      <section class="login-card" aria-label="注册卡片">
        <h1>创建你的校圈账号</h1>
        <p class="card-subtitle">加入校圈，记录真实口碑，发现更适合你的校园生活。</p>

        <div id="authMsg" class="auth-msg" role="alert" aria-live="polite"></div>

        <form id="registerForm" method="post" action="javascript:void(0);">
          <label class="field-wrap" for="username">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2.25c-4.14 0-7.5 2.52-7.5 5.63a.87.87 0 0 0 .88.87h13.24a.87.87 0 0 0 .88-.87c0-3.11-3.36-5.63-7.5-5.63Z"></path>
              </svg>
            </span>
            <input id="username" name="username" type="text" placeholder="请输入学号/工号/手机号" autocomplete="username" required />
          </label>

          <label class="field-wrap" for="password">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M17.25 10.5H16.5V8.25a4.5 4.5 0 0 0-9 0v2.25h-.75A2.25 2.25 0 0 0 4.5 12.75v6A2.25 2.25 0 0 0 6.75 21h10.5a2.25 2.25 0 0 0 2.25-2.25v-6a2.25 2.25 0 0 0-2.25-2.25ZM9 8.25a3 3 0 0 1 6 0v2.25H9ZM12 17.25a1.13 1.13 0 1 1 1.13-1.13A1.13 1.13 0 0 1 12 17.25Z"></path>
              </svg>
            </span>
            <input id="password" name="password" type="password" placeholder="请设置密码（不少于6位）" autocomplete="new-password" required />
          </label>

          <label class="field-wrap" for="confirmPassword">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M17.25 10.5H16.5V8.25a4.5 4.5 0 0 0-9 0v2.25h-.75A2.25 2.25 0 0 0 4.5 12.75v6A2.25 2.25 0 0 0 6.75 21h10.5a2.25 2.25 0 0 0 2.25-2.25v-6a2.25 2.25 0 0 0-2.25-2.25ZM9 8.25a3 3 0 0 1 6 0v2.25H9ZM12 17.25a1.13 1.13 0 1 1 1.13-1.13A1.13 1.13 0 0 1 12 17.25Z"></path>
              </svg>
            </span>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="请再次输入密码" autocomplete="new-password" required />
          </label>

          <button type="submit" class="login-btn">立即注册</button>
        </form>

        <div class="card-links">
          <a th:href="@{/login}" id="toLoginLink">已有账号？去登录</a>
          <span class="plain-tip">注册即表示同意平台使用规范</span>
        </div>
      </section>
    </main>
  </div>

  <script>
    (() => {
      const form = document.getElementById('registerForm');
      const msg = document.getElementById('authMsg');
      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const confirmEl = document.getElementById('confirmPassword');
      const langLink = document.getElementById('langLink');
      const toLoginLink = document.getElementById('toLoginLink');
      const registerCard = document.querySelector('.login-card');

      const setMsg = (text, ok) => {
        msg.textContent = text;
        msg.classList.toggle('show', !!text);
        msg.classList.toggle('error', !ok);
        msg.classList.toggle('success', !!ok);
      };

      langLink.addEventListener('click', (event) => event.preventDefault());
      requestAnimationFrame(() => registerCard.classList.add('card-ready'));

      toLoginLink.addEventListener('click', (event) => {
        event.preventDefault();
        document.body.classList.add('page-transition-out');
        setTimeout(() => {
          location.href = toLoginLink.getAttribute('href') || '/login';
        }, 260);
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const username = usernameEl.value.trim();
        const password = passwordEl.value;
        const confirmPassword = confirmEl.value;

        if (!username) {
          setMsg('请输入学号/工号/手机号', false);
          return;
        }
        if (!password || password.length < 6) {
          setMsg('密码长度不能少于6位', false);
          return;
        }
        if (password !== confirmPassword) {
          setMsg('两次输入的密码不一致，请重新确认', false);
          return;
        }

        try {
          const res = await fetch('/user/create', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const result = await res.json().catch(() => null);

          if (result && result.code === 200) {
            setMsg('注册成功，正在进入校圈...', true);
            localStorage.setItem('token', result.data.token);
            localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
            localStorage.setItem('username', result.data.username);
            localStorage.setItem('role', result.data.role || 'user');
            setTimeout(() => location.href = '/browse-post', 700);
          } else {
            setMsg((result && result.message) ? result.message : '注册失败，请稍后重试', false);
          }
        } catch (error) {
          setMsg('请求失败，请稍后重试', false);
        }
      });
    })();
  </script>
</body>
</html>
