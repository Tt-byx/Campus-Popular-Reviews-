<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子广场 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8fafc; }
    .wrap { max-width: 920px; margin: 24px auto; padding: 0 16px; }
    .post-card { border: 0; border-radius: 14px; box-shadow: 0 8px 20px rgba(15,23,42,0.06); }
    .post-title { font-weight: 700; color: #0f172a; }
    .meta { color: #64748b; font-size: 13px; }
    .content { color: #334155; white-space: pre-wrap; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 m-0">帖子广场</h1>
    <div class="d-flex gap-2">
      <a class="btn btn-primary btn-sm" href="/post">去发帖</a>
      <a class="btn btn-outline-secondary btn-sm" href="/login">登录页</a>
    </div>
  </div>

  <div id="msg" class="alert d-none" role="alert"></div>
  <div id="list" class="d-grid gap-3"></div>
</div>

<script>
  (() => {
    const msg = document.getElementById('msg');
    const list = document.getElementById('list');
    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();

    const setMsg = (text, type) => {
      msg.className = 'alert d-block alert-' + type;
      msg.textContent = text;
    };

    const renderList = (items) => {
      if (!Array.isArray(items) || !items.length) {
        list.innerHTML = '<div class="text-center text-muted py-5">暂无帖子，去发布第一条吧</div>';
        return;
      }
      list.innerHTML = items.map(item => {
        const title = item.title || '无标题';
        const content = item.content || '';
        const username = item.username || '未知用户';
        const score = item.score == null ? '未评分' : ('评分：' + item.score);
        const createdAt = item.createdAt || '';
        return (
          '<div class="card post-card"><div class="card-body">' +
          '<div class="d-flex justify-content-between align-items-start gap-3">' +
          '<div class="post-title">' + title + '</div>' +
          '<span class="badge text-bg-light">' + score + '</span>' +
          '</div>' +
          '<div class="meta mt-1">作者：' + username + ' · ' + createdAt + '</div>' +
          '<div class="content mt-3">' + content.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
          '</div></div>'
        );
      }).join('');
    };

    const load = async () => {
      try {
        const res = await fetch('/post/list', {
          method: 'GET',
          headers: {
            'Authorization': tokenType + ' ' + token
          }
        });
        const result = await res.json().catch(() => null);
        if (res.status === 401) {
          sessionStorage.setItem('authMsg', '请先登录后查看帖子');
          location.href = '/login';
          return;
        }
        if (!res.ok || !result || result.code !== 200) {
          const err = (result && result.message) ? result.message : ('加载失败（' + res.status + '）');
          setMsg(err, 'danger');
          return;
        }
        renderList(result.data || []);
      } catch (error) {
        setMsg('请求失败，请稍后重试', 'danger');
      }
    };

    load();
  })();
</script>
</body>
</html>
