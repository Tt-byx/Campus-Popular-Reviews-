<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子广场 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/app.css}" rel="stylesheet" />
</head>
<body>

<div class="bento-container">
  <!-- ═══ Sidebar ═══ -->
  <aside class="bento-sidebar" id="mainSidebar">
    <div class="bento-card sidebar-profile-card">
      <div class="sidebar-avatar" id="sidebarAvatar">U</div>
      <div class="sidebar-username" id="sidebarUsername">用户</div>
      <div class="sidebar-bio" id="sidebarBio">分享校园生活</div>
    </div>

    <div class="bento-card sidebar-nav" id="sidebarNav">
      <button class="sidebar-nav-item active" onclick="location.href='/browse-post'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        首页
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/categories'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        分类
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/ranking'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        排行
      </button>
      <button class="sidebar-nav-item" id="sidebarAdminBtn" style="display:none" onclick="location.href='/admin'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        管理
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/profile'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        个人中心
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/settings'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </button>
      <button class="sidebar-nav-item" id="sidebarLogoutBtn" style="display:none;color:var(--red)" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        退出登录
      </button>
    </div>

    <div class="bento-card bento-card-sm" id="sidebarLoginArea" style="display:none">
      <div class="bento-card-body text-center">
        <p class="text-secondary text-sm m-0" id="sidebarLoginInfo">登录以解锁全部功能</p>
        <div class="flex gap-2 justify-center mt-3" id="sidebarLoginBtns">
          <button class="btn btn-primary btn-sm" onclick="showLoginPrompt()">登录</button>
          <button class="btn btn-secondary btn-sm" onclick="showRegisterPrompt()">注册</button>
        </div>
      </div>
    </div>
  </aside>

  <script>
    (function(){
      var u = localStorage.getItem('username');
      if (u) {
        document.getElementById('sidebarUsername').textContent = u;
        document.getElementById('sidebarAvatar').textContent = u.charAt(0).toUpperCase();
        document.getElementById('sidebarBio').textContent = '';
        document.getElementById('sidebarLoginArea').style.display = 'none';
        document.getElementById('sidebarLogoutBtn').style.display = 'flex';
        var r = localStorage.getItem('role') || 'user';
        if (r === 'admin' || r === 'super_admin') {
          document.getElementById('sidebarAdminBtn').style.display = 'flex';
        }
      } else {
        document.getElementById('sidebarLoginArea').style.display = 'block';
        document.getElementById('sidebarLogoutBtn').style.display = 'none';
      }
    })();
  </script>

  <!-- ═══ Main Content ═══ -->
  <main class="bento-main">
    <!-- Header -->
    <div class="bento-header">
      <div class="bento-header-left">
        <h1>校圈</h1>
        <p>发现校园新动态</p>
      </div>
      <div class="nav-bar" id="navBar">
        <button class="nav-bar-item" onclick="refreshPosts()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
          刷新
        </button>
        <button class="nav-bar-item cta" id="createPostBtn" onclick="location.href='/post'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></svg>
          去发帖
        </button>
      </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
      <div class="search-bar-inner glass">
        <svg class="search-bar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="搜索帖子或评论对象..." />
        <button class="search-bar-submit" onclick="performSearch()" title="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>

    <!-- Content -->
    <div id="msg" class="alert d-none" role="alert"></div>
    <div class="posts-grid" id="list"></div>
  </main>
</div>

<!-- Login Modal -->
<div class="modal fade auth-modal" id="loginModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">登录</h5>
        <p class="modal-subtitle">欢迎回到校圈</p>
      </div>
      <div class="modal-body">
        <div id="loginModalMsg" class="alert d-none mb-3" role="alert"></div>
        <form id="loginForm">
          <div class="mb-3">
            <input type="text" id="loginUsername" class="form-control" placeholder="用户名" required>
          </div>
          <div class="mb-4">
            <input type="password" id="loginPassword" class="form-control" placeholder="密码" required>
          </div>
          <button type="submit" class="btn-submit mb-3">登录</button>
          <div class="text-center" style="font-size:0.88rem">
            <span class="text-secondary">还没有账号？</span>
            <a href="javascript:void(0)" onclick="switchModal('register')" class="switch-link">立即注册</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal fade auth-modal" id="registerModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">注册</h5>
        <p class="modal-subtitle">加入校圈社区</p>
      </div>
      <div class="modal-body">
        <div id="registerModalMsg" class="alert d-none mb-3" role="alert"></div>
        <form id="registerForm">
          <div class="mb-3">
            <input type="text" id="registerUsername" class="form-control" placeholder="设置用户名" required>
          </div>
          <div class="mb-4">
            <input type="password" id="registerPassword" class="form-control" placeholder="设置密码 (至少6位)" required>
          </div>
          <button type="submit" class="btn-submit mb-3">注册</button>
          <div class="text-center" style="font-size:0.88rem">
            <span class="text-secondary">已有账号？</span>
            <a href="javascript:void(0)" onclick="switchModal('login')" class="switch-link">返回登录</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    document.querySelectorAll('.sidebar-nav-item').forEach(item => {
      const orig = item.getAttribute('onclick');
      if (!orig || !orig.includes('location.href')) return;
      item.removeAttribute('onclick');
      item.addEventListener('click', function(e) {
        e.preventDefault();
        let url = '';
        const match = orig.match(/location\.href\s*=\s*['"]([^'"]+)['"]/);
        if (match) {
          url = match[1];
        } else {
          const funcMatch = orig.match(/location\.href\s*=\s*(\S+)/);
          if (funcMatch) {
            url = funcMatch[1].replace(/[();\s]+$/, '');
          }
        }
        if (!url) return;
        document.body.classList.add('page-transitioning');
        setTimeout(() => { 
          window.location.href = url;
        }, 120);
      });
    });

    const list = document.getElementById('list');
    const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
    const registerModal = new bootstrap.Modal(document.getElementById('registerModal'));

    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();
    const username = localStorage.getItem('username') || '';

    const setMsg = (el, text, type) => {
      if (!el) return;
      el.className = 'alert d-block alert-' + type + ' py-2 small';
      el.textContent = text;
    };

    window.performSearch = () => {
      const keyword = document.getElementById('searchInput').value.trim();
      if (!keyword) {
        alert('请输入搜索关键词');
        return;
      }
      window.location.href = '/search?keyword=' + encodeURIComponent(keyword);
    };

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        performSearch();
      }
    });

    window.switchModal = (to) => {
      if (to === 'register') {
        loginModal.hide();
        setTimeout(() => registerModal.show(), 400);
      } else {
        registerModal.hide();
        setTimeout(() => loginModal.show(), 400);
      }
    };

    window.showLoginPrompt = (msg) => {
      loginModal.show();
      if (msg) setMsg(document.getElementById('loginModalMsg'), msg, 'warning');
    };

    window.showRegisterPrompt = () => {
      registerModal.show();
    };

    const handleLogout = () => {
      if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('token');
        localStorage.removeItem('tokenType');
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        location.reload();
      }
    };
    window.handleLogout = handleLogout;

    // Render sidebar based on auth state
    const initSidebar = async () => {
      const sidebarAvatar = document.getElementById('sidebarAvatar');
      const sidebarUsername = document.getElementById('sidebarUsername');
      const sidebarBio = document.getElementById('sidebarBio');
      const sidebarLoginArea = document.getElementById('sidebarLoginArea');
      const sidebarLogoutBtn = document.getElementById('sidebarLogoutBtn');
      const sidebarAdminBtn = document.getElementById('sidebarAdminBtn');

      if (token) {
        sidebarLoginArea.style.display = 'none';
        sidebarLogoutBtn.style.display = 'flex';
        const role = localStorage.getItem('role') || 'user';
        if (role === 'admin' || role === 'super_admin') {
          sidebarAdminBtn.style.display = 'flex';
        }
        sidebarUsername.textContent = username || '用户';
        if (username) {
          sidebarAvatar.textContent = username.charAt(0).toUpperCase();
        }
        try {
          const res = await fetch('/user/profile', {
            headers: { 'Authorization': `${tokenType} ${token}` }
          });
          const result = await res.json();
          if (result.code === 200) {
            if (result.data.avatar) {
              sidebarAvatar.innerHTML = `<img src="${result.data.avatar}" alt="avatar">`;
            }
            if (result.data.signature) sidebarBio.textContent = result.data.signature;
          }
        } catch (e) { /* ignore */ }
      } else {
        sidebarLoginArea.style.display = 'block';
        sidebarLogoutBtn.style.display = 'none';
        sidebarAdminBtn.style.display = 'none';
      }
    };

    const initNav = () => {
      const createPostBtn = document.getElementById('createPostBtn');
      if (!token) {
        createPostBtn.onclick = () => showLoginPrompt('请先登录后再进行此操作');
      } else {
        createPostBtn.onclick = () => location.href = '/post';
      }
    };

    const renderList = (items) => {
      if (!items || !items.length) {
        list.innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><p>暂无帖子</p></div>';
        return;
      }
      list.innerHTML = items.map(item => `
        <div class="post-card" onclick="location.href='/post-detail?id=${item.id}'">
          <div class="post-card-inner">
            <div class="post-card-header">
              <div class="post-card-title">${item.title}</div>
              ${item.tag ? `<span class="post-card-tag">#${item.tag}</span>` : ''}
            </div>
            <div class="post-card-meta">
              <span class="post-card-author">
                <span class="post-card-avatar">${item.avatar ? `<img src="${item.avatar}" alt="${item.username}">` : (item.username || 'U').charAt(0).toUpperCase()}</span>
                ${item.username || '未知'}
              </span>
              <span>·</span>
              <span>${item.createdAt || ''}</span>
            </div>
            ${item.imageUrl ? `
            <div class="post-card-image">
              <img src="${item.imageUrl}" alt="${item.title}" loading="lazy" />
            </div>` : ''}
            <div class="post-card-content">${item.content}</div>
            <div class="post-card-stats">
              <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${item.viewCount || 0}</span>
              <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${item.commentCount || 0}</span>
            </div>
          </div>
        </div>
      `).join('');
    };

    const load = async () => {
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;

      let previousTopIds = JSON.parse(localStorage.getItem('previousTopIds') || '[]');

      try {
        const res = await fetch('/post/list/personalized?previousIds=' + previousTopIds.join(','), { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          renderList(result.data);
          const newTopIds = result.data.slice(0, 10).map(item => item.id);
          localStorage.setItem('previousTopIds', JSON.stringify(newTopIds));
        }
      } catch (e) { console.error(e); }
    };

    window.refreshPosts = async () => {
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;

      let previousTopIds = JSON.parse(localStorage.getItem('previousTopIds') || '[]');

      try {
        const res = await fetch('/post/list/personalized?_=' + Date.now() + '&previousIds=' + previousTopIds.join(','), { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          renderList(result.data);
          const newTopIds = result.data.slice(0, 10).map(item => item.id);
          localStorage.setItem('previousTopIds', JSON.stringify(newTopIds));
        }
      } catch (e) { console.error('刷新失败:', e); }
    };

    // Login form
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('loginUsername').value.trim();
      const p = document.getElementById('loginPassword').value;
      const modalMsg = document.getElementById('loginModalMsg');
      try {
        const res = await fetch('/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const result = await res.json();
        if (res.ok && result.code === 200) {
          localStorage.setItem('token', result.data.token);
          localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
          localStorage.setItem('username', result.data.username || u);
          localStorage.setItem('role', result.data.role || 'user');
          setMsg(modalMsg, '登录成功', 'success');
          setTimeout(() => location.reload(), 800);
        } else {
          setMsg(modalMsg, result.message || '登录失败', 'danger');
        }
      } catch (e) { setMsg(modalMsg, '网络请求失败', 'danger'); }
    });

    // Register form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('registerUsername').value.trim();
      const p = document.getElementById('registerPassword').value;
      const modalMsg = document.getElementById('registerModalMsg');
      if (p.length < 6) return setMsg(modalMsg, '密码至少需要6位', 'danger');
      try {
        const res = await fetch('/user/create', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: u, password: p })
        });
        const result = await res.json();
        if (res.ok && result.code === 200) {
          localStorage.setItem('token', result.data.token);
          localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
          localStorage.setItem('username', result.data.username || u);
          localStorage.setItem('role', result.data.role || 'user');
          setMsg(modalMsg, '注册成功', 'success');
          setTimeout(() => location.reload(), 800);
        } else {
          setMsg(modalMsg, result.message || '注册失败', 'danger');
        }
      } catch (e) { setMsg(modalMsg, '网络请求失败', 'danger'); }
    });

    initSidebar();
    initNav();
    load();

    const showLoginMsg = localStorage.getItem('showLoginMsg');
    if (showLoginMsg) {
      localStorage.removeItem('showLoginMsg');
      showLoginPrompt(showLoginMsg);
    }
  })();
</script>
</body>
</html>
