<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>搜索结果 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
        --apple-bg: #f5f5f7;
        --apple-card: #ffffff;
        --apple-text: #1d1d1f;
        --apple-secondary: #86868b;
        --apple-blue: #0066cc;
        --apple-radius: 18px;
        --apple-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    body { background: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 920px; margin: 40px auto; padding: 0 20px; }

    .search-header {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      padding: 24px;
      box-shadow: var(--apple-shadow);
      margin-bottom: 24px;
    }

    .search-input-group {
      display: flex;
      gap: 12px;
    }

    .search-input {
      flex: 1;
      border: none;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      transition: background 0.2s;
    }

    .search-input:focus {
      outline: none;
      background: rgba(0, 0, 0, 0.08);
    }

    .search-btn {
      background: var(--apple-blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .search-btn:hover { opacity: 0.9; }

    .result-section {
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--apple-text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-card {
        border: none;
        border-radius: var(--apple-radius);
        background: var(--apple-card);
        box-shadow: var(--apple-shadow);
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
        margin-bottom: 16px;
        cursor: pointer;
    }

    .result-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }

    .result-title { font-weight: 600; font-size: 1.1rem; letter-spacing: -0.01em; }
    .meta { color: var(--apple-secondary); font-size: 0.85rem; }
    .content { color: #333; line-height: 1.5; margin-top: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .badge-apple { background: #f0f0f2; color: #666; font-weight: 500; border-radius: 8px; padding: 4px 10px; font-size: 0.75rem; border: none; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--apple-secondary);
    }

    .nav-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--apple-blue);
      text-decoration: none;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .nav-back:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
<div class="wrap">
  <a href="/browse-post" class="nav-back">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
    </svg>
    返回帖子广场
  </a>

  <div class="search-header">
    <h1 class="h4 fw-bold mb-3">搜索结果</h1>
    <div class="search-input-group">
      <input type="text" id="searchInput" class="search-input" placeholder="搜索帖子或评论对象..." />
      <button class="search-btn" onclick="performSearch()">搜索</button>
    </div>
    <div class="mt-2 small text-secondary" id="resultCount"></div>
  </div>

  <div id="results">
    <div class="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor" style="opacity: 0.3;">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <p class="mt-3">输入关键词开始搜索</p>
    </div>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const keyword = urlParams.get('keyword');

  if (keyword) {
    document.getElementById('searchInput').value = keyword;
    performSearch();
  }

  document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      performSearch();
    }
  });

  async function performSearch() {
    const keyword = document.getElementById('searchInput').value.trim();
    if (!keyword) {
      alert('请输入搜索关键词');
      return;
    }

    window.history.pushState({}, '', '/search?keyword=' + encodeURIComponent(keyword));

    try {
      const response = await fetch('/post/search?keyword=' + encodeURIComponent(keyword));
      const result = await response.json();

      if (result.code === 200) {
        renderResults(result.data);
      } else {
        showError(result.message || '搜索失败');
      }
    } catch (error) {
      console.error('搜索失败:', error);
      showError('网络请求失败');
    }
  }

  function renderResults(data) {
    const resultsDiv = document.getElementById('results');
    const resultCountDiv = document.getElementById('resultCount');

    const posts = data.posts || [];
    const reviewTargets = data.reviewTargets || [];
    const totalResults = data.totalResults || 0;

    resultCountDiv.textContent = `找到 ${totalResults} 个结果`;

    if (totalResults === 0) {
      resultsDiv.innerHTML = `
        <div class="empty-state">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor" style="opacity: 0.3;">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <p class="mt-3">未找到相关结果</p>
          <p class="small">尝试使用不同的关键词</p>
        </div>
      `;
      return;
    }

    let html = '';

    if (posts.length > 0) {
      html += `
        <div class="result-section">
          <div class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/>
            </svg>
            帖子 (${posts.length})
          </div>
          ${posts.map(post => `
            <div class="card result-card" onclick="location.href='/post-detail?id=${post.id}'">
              <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-start">
                  <div class="result-title">${highlightKeyword(post.title, '${keyword}')}</div>
                  ${post.tag ? `<span class="badge badge-apple">#${post.tag}</span>` : ''}
                </div>
                <div class="meta mt-1">作者：${post.username || '未知'} · ${formatDate(post.createdAt)}</div>
                <div class="content">${post.content}</div>
                <div class="meta mt-2">
                  <span>👁️ ${post.viewCount || 0}</span>
                  <span class="ms-3">💬 ${post.commentCount || 0}</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    if (reviewTargets.length > 0) {
      html += `
        <div class="result-section">
          <div class="section-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
            评论对象 (${reviewTargets.length})
          </div>
          ${reviewTargets.map(target => `
            <div class="card result-card" onclick="location.href='/review-target-detail?id=${target.id}'">
              <div class="card-body p-4">
                <div class="result-title">${highlightKeyword(target.targetName, '${keyword}')}</div>
                <div class="meta mt-1">所属帖子：${target.postTitle}</div>
                <div class="meta mt-2">
                  <span>💬 ${target.commentCount || 0} 条评论</span>
                  <span class="ms-3">📅 ${formatDate(target.createdAt)}</span>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    resultsDiv.innerHTML = html;
  }

  function highlightKeyword(text, keyword) {
    if (!keyword) return text;
    const regex = new RegExp(`(${keyword})`, 'gi');
    return text.replace(regex, '<mark style="background: #fff3cd; padding: 2px 4px; border-radius: 4px;">$1</mark>');
  }

  function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    const now = new Date();
    const diff = now - date;

    const minute = 60 * 1000;
    const hour = 60 * minute;
    const day = 24 * hour;

    if (diff < minute) return '刚刚';
    if (diff < hour) return Math.floor(diff / minute) + '分钟前';
    if (diff < day) return Math.floor(diff / hour) + '小时前';
    if (diff < 7 * day) return Math.floor(diff / day) + '天前';

    return date.toLocaleDateString('zh-CN');
  }

  function showError(message) {
    document.getElementById('results').innerHTML = `
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor" style="opacity: 0.3; color: #dc3545;">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
        </svg>
        <p class="mt-3 text-danger">${message}</p>
      </div>
    `;
  }
</script>
</body>
</html>
