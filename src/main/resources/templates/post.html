<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>发布帖子 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/app.css}" rel="stylesheet" />
</head>
<body>
<div class="bento-container" style="grid-template-columns:1fr;max-width:760px">
  <main class="bento-main">
    <div class="bento-card" style="padding:36px">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h1 class="fw-bold" style="font-size:1.5rem;color:var(--slate)">发布帖子</h1>
        <div class="d-flex gap-2">
          <button class="btn btn-ghost btn-sm" onclick="location.href='/settings'">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          </button>
          <button class="btn btn-ghost btn-sm" onclick="location.href='/browse-post'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            帖子广场
          </button>
        </div>
      </div>
      <p class="text-secondary mb-4" style="font-size:14px">填写标题和内容即可发布。未登录会自动跳转到登录页。</p>

      <div id="formMsg" class="alert d-none" role="alert"></div>

      <form id="postForm" method="post" action="javascript:void(0);">
        <div class="mb-3">
          <label for="title" class="form-label fw-semibold small text-secondary">标题</label>
          <input id="title" name="title" type="text" class="f-input" maxlength="100" placeholder="请输入标题（最多100字）" required />
        </div>

        <div class="mb-3">
          <label for="content" class="form-label fw-semibold small text-secondary">内容</label>
          <textarea id="content" name="content" class="f-input" placeholder="请输入帖子内容" required></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small text-secondary">标签</label>
          <div class="d-flex flex-wrap gap-2">
            <label class="tag-radio">
              <input type="radio" name="tag" value="食堂" />
              <span>#食堂</span>
            </label>
            <label class="tag-radio">
              <input type="radio" name="tag" value="课程" />
              <span>#课程</span>
            </label>
            <label class="tag-radio">
              <input type="radio" name="tag" value="社团" />
              <span>#社团</span>
            </label>
            <label class="tag-radio">
              <input type="radio" name="tag" value="活动" />
              <span>#活动</span>
            </label>
            <label class="tag-radio">
              <input type="radio" name="tag" value="其他" />
              <span>#其他</span>
            </label>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold small text-secondary">配图（可选，仅支持图片）</label>
          <div class="image-upload-zone" id="imageUploadZone">
            <div id="uploadPlaceholder" class="upload-placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <path d="M21 15l-5-5L5 21"/>
              </svg>
              <div>点击或拖拽上传图片</div>
              <div class="image-hint">支持 JPG / PNG / GIF / WebP，最大 10MB</div>
            </div>
            <img id="previewImg" src="" alt="预览" class="d-none">
            <input id="image" type="file" accept="image/jpeg,image/png,image/gif,image/webp" />
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button id="submitBtn" type="submit" class="btn btn-primary btn-lg flex-1">发布帖子</button>
          <button type="button" id="resetBtn" class="btn btn-secondary">重置</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  (() => {
    document.querySelectorAll('.sidebar-nav-item').forEach(item => {
      const orig = item.getAttribute('onclick');
      if (!orig || !orig.includes('location.href')) return;
      item.removeAttribute('onclick');
      item.addEventListener('click', function(e) {
        e.preventDefault();
        let url = '';
        const match = orig.match(/location\.href\s*=\s*['"]([^'"]+)['"]/);
        if (match) {
          url = match[1];
        } else {
          const funcMatch = orig.match(/location\.href\s*=\s*(\S+)/);
          if (funcMatch) {
            url = funcMatch[1].replace(/[();\s]+$/, '');
          }
        }
        if (!url) return;
        document.body.classList.add('page-transitioning');
        setTimeout(() => { 
          window.location.href = url;
        }, 120);
      });
    });

    const form = document.getElementById('postForm');
    const submitBtn = document.getElementById('submitBtn');
    const resetBtn = document.getElementById('resetBtn');
    const msg = document.getElementById('formMsg');
    const titleEl = document.getElementById('title');
    const contentEl = document.getElementById('content');
    const imageEl = document.getElementById('image');
    const previewImg = document.getElementById('previewImg');

    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();

    const setMsg = (text, type) => {
      msg.className = 'alert d-block alert-' + type;
      msg.textContent = text;
    };

    const clearMsg = () => {
      msg.className = 'alert d-none';
      msg.textContent = '';
    };

    const redirectToLogin = () => {
      localStorage.setItem('showLoginMsg', '请先登录后再发布帖子');
      location.href = '/browse-post';
    };

    if (!token) {
      redirectToLogin();
      return;
    }

    const uploadZone = document.getElementById('imageUploadZone');
    const uploadPlaceholder = document.getElementById('uploadPlaceholder');

    const allowedTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
    const maxSize = 10 * 1024 * 1024;

    imageEl.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) {
        previewImg.classList.add('d-none');
        uploadPlaceholder.classList.remove('d-none');
        uploadZone.classList.remove('has-image');
        return;
      }

      if (!allowedTypes.includes(file.type)) {
        setMsg('仅支持 JPG / PNG / GIF / WebP 格式的图片', 'danger');
        imageEl.value = '';
        return;
      }
      if (file.size > maxSize) {
        setMsg('图片大小不能超过 10MB', 'danger');
        imageEl.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        previewImg.src = e.target.result;
        previewImg.classList.remove('d-none');
        uploadPlaceholder.classList.add('d-none');
        uploadZone.classList.add('has-image');
        clearMsg();
      };
      reader.readAsDataURL(file);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = (titleEl.value || '').trim();
      const content = (contentEl.value || '').trim();
      const tagEl = document.querySelector('input[name="tag"]:checked');
      const tag = tagEl ? tagEl.value : '';

      if (!title) return setMsg('标题不能为空', 'danger');
      if (title.length > 100) return setMsg('标题长度不能超过 100 字', 'danger');
      if (!content) return setMsg('内容不能为空', 'danger');

      const formData = new FormData();
      formData.append('title', title);
      formData.append('content', content);
      if (tag) formData.append('tag', tag);
      if (imageEl.files[0]) formData.append('image', imageEl.files[0]);

      submitBtn.disabled = true;
      clearMsg();
      try {
        const res = await fetch('/post', {
          method: 'POST',
          headers: { 'Authorization': tokenType + ' ' + token },
          body: formData
        });
        const result = await res.json().catch(() => null);

        if (res.status === 401) { redirectToLogin(); return; }
        if (!res.ok || !result || result.code !== 200) {
          const err = (result && result.message) ? result.message : ('发布失败（' + res.status + '）');
          setMsg(err, 'danger');
          return;
        }

        setMsg('发布成功，正在返回帖子广场...', 'success');
        form.reset();
        previewImg.classList.add('d-none');
        uploadPlaceholder.classList.remove('d-none');
        uploadZone.classList.remove('has-image');
        setTimeout(() => { location.href = '/browse-post'; }, 500);
      } catch (error) {
        setMsg('请求失败，请稍后重试', 'danger');
      } finally {
        submitBtn.disabled = false;
      }
    });

    resetBtn.addEventListener('click', () => {
      form.reset();
      previewImg.classList.add('d-none');
      uploadPlaceholder.classList.remove('d-none');
      uploadZone.classList.remove('has-image');
      clearMsg();
    });
  })();
</script>

<style>
  body { background: var(--bg); min-height: 100vh; }
  .image-upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .image-upload-zone:hover {
    border-color: var(--sapphire-light);
    background: rgba(37, 99, 235, 0.03);
  }
  .image-upload-zone.has-image {
    border-style: solid;
    border-color: var(--green);
    padding: 8px;
  }
  .image-upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
  }
  .upload-placeholder {
    color: var(--text-muted);
    font-size: 14px;
  }
  .upload-placeholder svg {
    margin-bottom: 8px;
    opacity: 0.4;
  }
  #previewImg {
    max-height: 280px;
    object-fit: cover;
    border-radius: var(--radius-md);
    width: 100%;
  }
  .image-hint {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .tag-radio {
    cursor: pointer;
  }
  .tag-radio input {
    display: none;
  }
  .tag-radio span {
    display: inline-block;
    padding: 6px 14px;
    border-radius: var(--radius-full);
    background: var(--gray-100);
    color: var(--text-secondary);
    font-size: 0.85rem;
    font-weight: 500;
    transition: all 0.15s ease;
  }
  .tag-radio input:checked + span {
    background: var(--sapphire);
    color: white;
  }
  .tag-radio:hover span {
    background: var(--gray-200);
  }
  .tag-radio input:checked:hover + span {
    background: var(--sapphire-dark);
  }
  .form-label { display: block; margin-bottom: 6px; }
  textarea.f-input { min-height: 220px; }
</style>
</body>
</html>
