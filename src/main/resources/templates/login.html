<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/auth.css}" rel="stylesheet" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"></div>
      <div class="h3 m-0 fw-bold">校圈</div>
    </div>

    <div class="auth-title h4">欢迎登录</div>

    <div id="authMsg" class="alert d-none" role="alert"></div>

    <form id="loginForm" method="post" action="javascript:void(0);">
      <div class="mb-3">
        <label for="username" class="form-label">用户名</label>
        <input id="username" name="username" type="text" class="form-control auth-input"
               placeholder="请输入用户名" autocomplete="username" required />
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">密码</label>
        <input id="password" name="password" type="password" class="form-control auth-input"
               placeholder="请输入密码" autocomplete="current-password" required />
      </div>

      <button type="submit" class="btn btn-primary w-100 auth-btn">登录</button>

      <div class="auth-links">
        <a href="#" id="forgotLink">忘记密码？</a>
      </div>

      <div class="text-center mt-2" style="font-size: 14px;">
        <span class="text-muted">还没有账号？</span>
        <a th:href="@{/register}">立即注册</a>
      </div>

      <div class="auth-footer">输入用户名和密码即可登录</div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('authMsg');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const forgotLink = document.getElementById('forgotLink');

    const setMsg = (text, type) => {
      msg.className = 'alert d-block alert-' + type;
      msg.textContent = text;
    };

    forgotLink.addEventListener('click', (e) => e.preventDefault());

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = usernameEl.value.trim();
      const password = passwordEl.value;

      if (!username || !password) return setMsg('用户名和密码不能为空', 'danger');

      try {
        const res = await fetch('/user/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await res.json().catch(() => null);

        if (result && result.code === 200) {
          if (result.data && result.data.token) {
            localStorage.setItem('token', result.data.token);
            localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
            localStorage.setItem('expiresIn', String(result.data.expiresIn || ''));
          }
          setMsg('登录成功', 'success');
        } else {
          setMsg((result && result.message) ? result.message : '登录失败', 'danger');
        }
      } catch (error) {
        setMsg('请求失败，请稍后重试', 'danger');
      }
    });
  })();
</script>
</body>
</html>
