<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/auth.css}" rel="stylesheet" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"></div>
      <div class="h3 m-0 fw-bold">校圈</div>
    </div>

    <div class="auth-title h4">欢迎回来</div>

    <div id="authMsg" class="alert d-none" role="alert"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">学号</label>
        <input id="username" name="username" type="text" class="form-control auth-input"
               placeholder="例如: 20231234A" autocomplete="username" required />
        <div class="form-text">8位数字+1位字母</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">密码</label>
        <input id="password" name="password" type="password" class="form-control auth-input"
               placeholder="请输入密码" autocomplete="current-password" required />
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" value="1" id="remember" />
        <label class="form-check-label" for="remember">记住我</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 auth-btn">登录</button>

      <div class="auth-links">
        <a href="#" id="forgotLink">忘记密码？</a>
      </div>

      <div class="text-center mt-2" style="font-size: 14px;">
        <span class="text-muted">还没有账号？</span>
        <a th:href="@{/register}">立即注册</a>
      </div>

      <div class="auth-footer">仅限本校学生使用 | 学号验证</div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('authMsg');
    const remember = document.getElementById('remember');
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const forgotLink = document.getElementById('forgotLink');

    const sidRe = /^\d{8}[A-Za-z]$/;

    const setMsg = (text, type) => {
      msg.className = 'alert d-block alert-' + type;
      msg.textContent = text;
    };

    forgotLink.addEventListener('click', (e) => e.preventDefault());

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = usernameEl.value.trim().toUpperCase();
      const password = passwordEl.value;

      if (!sidRe.test(username)) return setMsg('学号格式不正确（8位数字+1位字母）', 'danger');
      if (!password) return setMsg('请输入密码', 'danger');

      const res = await fetch('/user/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const result = await res.json().catch(() => null);

      if (result && result.code === 200) {
        const storage = remember.checked ? localStorage : sessionStorage;
        storage.setItem('token', result.data.token);
        storage.setItem('tokenType', result.data.tokenType || 'Bearer');
        storage.setItem('expiresIn', String(result.data.expiresIn || ''));
        setMsg('登录成功', 'success');
      } else {
        setMsg((result && result.message) ? result.message : '登录失败', 'danger');
      }
    });
  })();
</script>
</body>
</html>
