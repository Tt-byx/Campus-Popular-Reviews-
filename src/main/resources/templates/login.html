<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登录 - 校圈</title>
  <link th:href="@{/css/login-modern.css}" rel="stylesheet" />
</head>
<body>
  <div class="page-shell">
    <header class="top-header">
      <div class="brand-wrap">
        <div class="brand-logo-frame" aria-label="校圈Logo">
          <img th:src="@{/logo.png}" src="/logo.png" alt="校圈Logo" />
        </div>
        <div class="brand-text-group">
          <span class="brand-school">中国地质大学</span>
          <span class="brand-divider" aria-hidden="true"></span>
          <span class="brand-system">中国地质大学（武汉）校园虎扑登陆系统1.0</span>
        </div>
      </div>
      <a href="#" id="langLink" class="lang-link">English</a>
    </header>

    <main class="hero-main">
      <section class="login-card" aria-label="登录卡片">
        <h1>欢迎登录校圈</h1>
        <p class="card-subtitle">与同学分享校园里的真实体验，发现更值得去的地方。</p>

        <div id="authMsg" class="auth-msg" role="alert" aria-live="polite"></div>

        <form id="loginForm" method="post" action="javascript:void(0);">
          <label class="field-wrap" for="username">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 12a4.5 4.5 0 1 0-4.5-4.5A4.5 4.5 0 0 0 12 12Zm0 2.25c-4.14 0-7.5 2.52-7.5 5.63a.87.87 0 0 0 .88.87h13.24a.87.87 0 0 0 .88-.87c0-3.11-3.36-5.63-7.5-5.63Z"></path>
              </svg>
            </span>
            <input id="username" name="username" type="text" placeholder="学号/工号/手机号" autocomplete="username" required />
          </label>

          <label class="field-wrap" for="password">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M17.25 10.5H16.5V8.25a4.5 4.5 0 0 0-9 0v2.25h-.75A2.25 2.25 0 0 0 4.5 12.75v6A2.25 2.25 0 0 0 6.75 21h10.5a2.25 2.25 0 0 0 2.25-2.25v-6a2.25 2.25 0 0 0-2.25-2.25ZM9 8.25a3 3 0 0 1 6 0v2.25H9ZM12 17.25a1.13 1.13 0 1 1 1.13-1.13A1.13 1.13 0 0 1 12 17.25Z"></path>
              </svg>
            </span>
            <input id="password" name="password" type="password" placeholder="密码" autocomplete="current-password" required />
          </label>

          <button type="submit" class="login-btn">立即登录</button>
        </form>

        <div class="card-links">
          <a href="#" id="forgotLink">忘记密码？</a>
          <a th:href="@{/register}" id="toRegisterLink">还没有账号？立即注册</a>
        </div>
      </section>
    </main>
  </div>

  <script>
    (() => {
      const form = document.getElementById('loginForm');
      const msg = document.getElementById('authMsg');
      const usernameEl = document.getElementById('username');
      const passwordEl = document.getElementById('password');
      const forgotLink = document.getElementById('forgotLink');
      const langLink = document.getElementById('langLink');
      const toRegisterLink = document.getElementById('toRegisterLink');
      const loginCard = document.querySelector('.login-card');

      const setMsg = (text, ok) => {
        msg.textContent = text;
        msg.classList.toggle('show', !!text);
        msg.classList.toggle('error', !ok);
        msg.classList.toggle('success', !!ok);
      };

      const fromAuthRedirect = sessionStorage.getItem('authMsg');
      if (fromAuthRedirect) {
        setMsg(fromAuthRedirect, false);
        sessionStorage.removeItem('authMsg');
      }

      const persistLoginToken = (payload) => {
        if (!payload || !payload.token) return false;
        const token = String(payload.token).trim();
        if (!token) return false;
        const tokenType = (payload.tokenType || 'Bearer').toString().trim() || 'Bearer';
        localStorage.setItem('token', token);
        localStorage.setItem('tokenType', tokenType);
        localStorage.setItem('expiresIn', String(payload.expiresIn || ''));
        localStorage.setItem('username', payload.username || '');
        localStorage.setItem('role', payload.role || 'user');

        const maxAgeNum = Number(payload.expiresIn);
        if (Number.isFinite(maxAgeNum) && maxAgeNum > 0) {
          document.cookie = 'token=' + encodeURIComponent(token) + '; Path=/; Max-Age=' + Math.floor(maxAgeNum) + '; SameSite=Lax';
        } else {
          document.cookie = 'token=' + encodeURIComponent(token) + '; Path=/; SameSite=Lax';
        }
        return true;
      };

      forgotLink.addEventListener('click', (event) => event.preventDefault());
      langLink.addEventListener('click', (event) => event.preventDefault());
      requestAnimationFrame(() => loginCard.classList.add('card-ready'));

      toRegisterLink.addEventListener('click', (event) => {
        event.preventDefault();
        document.body.classList.add('page-transition-out');
        setTimeout(() => {
          location.href = toRegisterLink.getAttribute('href') || '/register';
        }, 260);
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const username = usernameEl.value.trim();
        const password = passwordEl.value;

        if (!username || !password) {
          setMsg('学号/工号/手机号和密码不能为空', false);
          return;
        }

        try {
          const res = await fetch('/user/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
          });
          const result = await res.json().catch(() => null);

          const isSuccess = !!(res.ok && result && (result.code === 200 || (result.data && result.data.token)));
          if (!isSuccess) {
            setMsg((result && result.message) ? result.message : '登录失败，请检查账号和密码', false);
            return;
          }

          persistLoginToken(result.data || null);
          setMsg('登录成功，正在进入校圈...', true);
          setTimeout(() => {
            location.href = '/browse-post';
          }, 500);
        } catch (error) {
          setMsg('请求失败，请稍后重试', false);
        }
      });
    })();
  </script>
</body>
</html>
