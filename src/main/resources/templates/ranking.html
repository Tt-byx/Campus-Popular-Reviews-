<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子排行 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/app.css}" rel="stylesheet" />
</head>
<body>
<div class="bento-container">
  <aside class="bento-sidebar" id="mainSidebar">
    <div class="bento-card sidebar-profile-card">
      <div class="sidebar-avatar" id="sidebarAvatar">U</div>
      <div class="sidebar-username" id="sidebarUsername">用户</div>
      <div class="sidebar-bio" id="sidebarBio">分享校园生活</div>
    </div>
    <div class="bento-card sidebar-nav">
      <button class="sidebar-nav-item" onclick="location.href='/browse-post'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        首页
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/categories'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        分类
      </button>
      <button class="sidebar-nav-item active" onclick="location.href='/ranking'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        排行
      </button>
      <button class="sidebar-nav-item" id="adminNavBtn" onclick="location.href='/admin'" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        管理
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/profile'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        个人中心
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/settings'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        设置
      </button>
      <button class="sidebar-nav-item" id="sidebarLogoutBtn" style="display:none;color:var(--red)" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        退出登录
      </button>
    </div>
    <div class="bento-card bento-card-sm" id="sidebarLoginArea" style="display:none">
      <div class="bento-card-body text-center">
        <p class="text-secondary text-sm m-0">登录以解锁全部功能</p>
        <div class="flex gap-2 justify-center mt-3">
          <button class="btn btn-primary btn-sm" onclick="showLoginPrompt()">登录</button>
          <button class="btn btn-secondary btn-sm" onclick="showRegisterPrompt()">注册</button>
        </div>
      </div>
    </div>
  </aside>

  <script>
    (function(){
      var u = localStorage.getItem('username');
      if (u) {
        document.getElementById('sidebarUsername').textContent = u;
        document.getElementById('sidebarAvatar').textContent = u.charAt(0).toUpperCase();
        document.getElementById('sidebarBio').textContent = '';
        document.getElementById('sidebarLoginArea').style.display = 'none';
        document.getElementById('sidebarLogoutBtn').style.display = 'flex';
        var r = localStorage.getItem('role') || 'user';
        if (r === 'admin' || r === 'super_admin') {
          var ab = document.getElementById('adminNavBtn');
          if (ab) ab.style.display = 'flex';
        }
      } else {
        document.getElementById('sidebarLoginArea').style.display = 'block';
        document.getElementById('sidebarLogoutBtn').style.display = 'none';
      }
    })();
  </script>

  <main class="bento-main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 class="fw-bold" style="font-size:1.5rem">帖子排行</h1>
        <p class="text-secondary small m-0">发现最受欢迎的校园动态</p>
      </div>
      <div class="d-flex gap-2 align-items-center">
        <select class="f-select" id="sortType" onchange="changeSortType()">
          <option value="hot">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            热度排行
          </option>
          <option value="time">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            时间排行
          </option>
        </select>
        <button class="btn btn-ghost btn-sm" onclick="location.href='/browse-post'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="me-1"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
          返回
        </button>
      </div>
    </div>
    <div id="list" class="d-grid gap-3"></div>
  </main>
</div>

<!-- Login Modal -->
<div class="modal fade auth-modal" id="loginModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">登录</h5>
        <p class="modal-subtitle">欢迎回到校圈</p>
      </div>
      <div class="modal-body">
        <form id="loginForm">
          <div class="mb-3"><input type="text" id="loginUsername" class="form-control" placeholder="用户名" required /></div>
          <div class="mb-4"><input type="password" id="loginPassword" class="form-control" placeholder="密码" required /></div>
          <button type="submit" class="btn-submit mb-3">登录</button>
          <div class="text-center" style="font-size:0.88rem"><span class="text-secondary">还没有账号？</span><a href="javascript:void(0)" onclick="switchModal('register')" class="switch-link">立即注册</a></div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal fade auth-modal" id="registerModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">注册</h5>
        <p class="modal-subtitle">加入校圈，分享校园生活</p>
      </div>
      <div class="modal-body">
        <form id="registerForm">
          <div class="mb-3"><input type="text" id="regUsername" class="form-control" placeholder="用户名" required /></div>
          <div class="mb-3"><input type="password" id="regPassword" class="form-control" placeholder="密码" required /></div>
          <div class="mb-4"><input type="password" id="regConfirmPassword" class="form-control" placeholder="确认密码" required /></div>
          <button type="submit" class="btn-submit mb-3">注册</button>
          <div class="text-center" style="font-size:0.88rem"><span class="text-secondary">已有账号？</span><a href="javascript:void(0)" onclick="switchModal('login')" class="switch-link">立即登录</a></div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    document.querySelectorAll('.sidebar-nav-item').forEach(item => {
      const orig = item.getAttribute('onclick');
      if (!orig || !orig.includes('location.href')) return;
      item.removeAttribute('onclick');
      item.addEventListener('click', function(e) {
        e.preventDefault();
        let url = '';
        const match = orig.match(/location\.href\s*=\s*['"]([^'"]+)['"]/);
        if (match) {
          url = match[1];
        } else {
          const funcMatch = orig.match(/location\.href\s*=\s*(\S+)/);
          if (funcMatch) {
            url = funcMatch[1].replace(/[();\s]+$/, '');
          }
        }
        if (!url) return;
        document.body.classList.add('page-transitioning');
        setTimeout(() => { 
          window.location.href = url;
        }, 120);
      });
    });

    const token = localStorage.getItem('token');
  const tokenType = localStorage.getItem('tokenType') || 'Bearer';
  const username = localStorage.getItem('username');
  const role = localStorage.getItem('role') || 'user';

  let loginModal, registerModal;
  document.addEventListener('DOMContentLoaded', () => {
    loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
    registerModal = new bootstrap.Modal(document.getElementById('registerModal'));
    initSidebar();
    initNav();
    loadPosts(currentSortType);
  });

  window.showLoginPrompt = () => loginModal.show();
  window.showRegisterPrompt = () => registerModal.show();

  window.switchModal = (type) => {
    if (type === 'login') { registerModal.hide(); loginModal.show(); }
    else { loginModal.hide(); registerModal.show(); }
  };

  const initSidebar = async () => {
    if (!token) { document.getElementById('sidebarLoginArea').style.display = ''; return; }
    document.getElementById('sidebarLoginArea').style.display = 'none';
    document.getElementById('sidebarLogoutBtn').style.display = 'flex';
    if (role === 'admin' || role === 'super_admin') document.getElementById('adminNavBtn').style.display = 'flex';
    try {
      const res = await fetch('/user/profile', { headers: { 'Authorization': `${tokenType} ${token}` } });
      const result = await res.json();
      if (result.code === 200) {
        const data = result.data;
        document.getElementById('sidebarUsername').textContent = data.username || username;
        document.getElementById('sidebarBio').textContent = data.signature || '';
        const avatarEl = document.getElementById('sidebarAvatar');
        if (data.avatar) avatarEl.innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
        else avatarEl.textContent = (data.username || username).charAt(0).toUpperCase();
      }
    } catch (e) {}
  };

  const initNav = () => {
    if (role === 'admin' || role === 'super_admin') {
      const el = document.getElementById('adminNavBtn');
      if (el) el.style.display = '';
    }
  };

  window.handleLogout = () => {
    if (confirm('确定要退出登录吗？')) {
      localStorage.removeItem('token');
      localStorage.removeItem('tokenType');
      localStorage.removeItem('username');
      localStorage.removeItem('role');
      location.href = '/browse-post';
    }
  };

  let currentSortType = 'hot';

  window.changeSortType = () => {
    currentSortType = document.getElementById('sortType').value;
    loadPosts(currentSortType);
  };

  const formatDate = (dateStr) => {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      const now = new Date();
      const diff = now - d;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      return `${d.getMonth()+1}月${d.getDate()}日`;
    } catch (e) { return dateStr; }
  };

  const renderList = (items) => {
    const list = document.getElementById('list');
    if (!items || !items.length) {
      list.innerHTML = `
        <div class="bento-card p-5 text-center">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-secondary);opacity:0.3;margin-bottom:16px">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <div class="h5 fw-bold">暂无帖子</div>
          <p class="text-secondary small mt-2">快来发布第一条帖子吧</p>
        </div>
      `;
      return;
    }
    list.innerHTML = items.map((item, index) => {
      const rank = index + 1;
      let rankClass = 'rank-badge-other';
      if (rank === 1) rankClass = 'rank-badge-1';
      else if (rank === 2) rankClass = 'rank-badge-2';
      else if (rank === 3) rankClass = 'rank-badge-3';

      return `
        <div class="post-card" onclick="location.href='/post-detail?id=${item.id}&from=ranking'">
          <div class="post-card-inner" style="padding-left:60px">
            <div class="rank-badge ${rankClass}">${rank}</div>
            <div class="post-card-header">
              <div class="post-card-title">${item.title}</div>
              ${item.tag ? `<span class="tag-badge tag-badge-orange">#${item.tag}</span>` : ''}
            </div>
            <div class="post-card-meta">
              <span class="post-card-author">
                <span class="post-card-author-avatar">${item.avatar ? `<img src="${item.avatar}" alt="${item.username}">` : (item.username || '?').charAt(0).toUpperCase()}</span>
                ${item.username || '未知'}
              </span>
              <span>${formatDate(item.createdAt)}</span>
            </div>
            ${item.content ? `<div class="post-card-content">${item.content}</div>` : ''}
            <div class="post-card-stats">
              <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${item.viewCount || 0}</span>
              <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>${item.commentCount || 0}</span>
            </div>
            ${item.imageUrl ? `
              <div class="post-card-image">
                <img src="${item.imageUrl}" alt="${item.title}" loading="lazy" />
              </div>
            ` : ''}
          </div>
        </div>
      `;
    }).join('');
  };

  const loadPosts = async (sortType) => {
    try {
      const res = await fetch(`/post/list/ranking?sort=${sortType}`);
      const result = await res.json();
      if (result.code === 200) renderList(result.data);
    } catch (e) { console.error('加载排行失败:', e); }
  };

  // Auth forms
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const usernameVal = document.getElementById('loginUsername').value.trim();
    const passwordVal = document.getElementById('loginPassword').value.trim();
    if (!usernameVal || !passwordVal) { alert('请填写用户名和密码'); return; }
    try {
      const res = await fetch('/user/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: usernameVal, password: passwordVal }) });
      const result = await res.json();
      if (result.code === 200) {
        localStorage.setItem('token', result.data.token);
        localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
        localStorage.setItem('username', result.data.username || usernameVal);
        localStorage.setItem('role', result.data.role || 'user');
        loginModal.hide();
        location.reload();
      } else { alert(result.message || '登录失败'); }
    } catch (err) { alert('网络错误'); }
  });

  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const usernameVal = document.getElementById('regUsername').value.trim();
    const passwordVal = document.getElementById('regPassword').value.trim();
    const confirmVal = document.getElementById('regConfirmPassword').value.trim();
    if (!usernameVal || !passwordVal || !confirmVal) { alert('请填写所有字段'); return; }
    if (passwordVal !== confirmVal) { alert('两次密码输入不一致'); return; }
    try {
      const res = await fetch('/user/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: usernameVal, password: passwordVal }) });
      const result = await res.json();
      if (result.code === 200) {
        localStorage.setItem('token', result.data.token);
        localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
        localStorage.setItem('username', result.data.username);
        localStorage.setItem('role', result.data.role || 'user');
        location.reload();
      } else { alert(result.message || '注册失败'); }
    } catch (err) { alert('网络错误'); }
  });
  })();
</script>
</body>
</html>
