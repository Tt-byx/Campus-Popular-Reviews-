<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>管理中心 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
        --apple-bg: #f5f5f7;
        --apple-card: #ffffff;
        --apple-text: #1d1d1f;
        --apple-secondary: #86868b;
        --apple-blue: #0066cc;
        --apple-red: #ff3b30;
        --apple-orange: #ff9500;
        --apple-green: #34c759;
        --apple-radius: 18px;
        --apple-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    body { background: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }
    .admin-title { font-weight: 700; font-size: 2rem; letter-spacing: -0.02em; }
    
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--apple-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 20px;
        transition: all 0.2s ease;
    }
    .back-btn:hover {
        color: var(--apple-blue);
        background: rgba(0, 102, 204, 0.06);
        text-decoration: none;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      background: var(--apple-card);
      border-radius: 12px;
      padding: 4px;
      box-shadow: var(--apple-shadow);
    }
    .tab-btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--apple-secondary);
      transition: all 0.2s;
    }
    .tab-btn.active {
      background: var(--apple-blue);
      color: white;
    }
    .tab-btn:hover:not(.active) { background: #f0f0f2; }

    .card {
      border: none;
      border-radius: var(--apple-radius);
      background: var(--apple-card);
      box-shadow: var(--apple-shadow);
      overflow: hidden;
    }
    .table { margin-bottom: 0; }
    .table th {
      background: #fafafa;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--apple-secondary);
      text-transform: uppercase;
      letter-spacing: 0.03em;
      border: none;
      padding: 14px 16px;
    }
    .table td {
      vertical-align: middle;
      padding: 12px 16px;
      border-color: #f0f0f2;
      font-size: 0.92rem;
    }
    .table tbody tr:hover { background: #fafafa; }

    .badge-role-admin {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-role-user {
      background: #e8e8ed;
      color: var(--apple-secondary);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-status-active {
      background: rgba(52,199,89,0.12);
      color: var(--apple-green);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-status-muted {
      background: rgba(255,59,48,0.1);
      color: var(--apple-red);
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .btn-action {
      padding: 4px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-mute { background: rgba(255,149,0,0.1); color: var(--apple-orange); }
    .btn-mute:hover { background: var(--apple-orange); color: white; }
    .btn-delete { background: rgba(255,59,48,0.1); color: var(--apple-red); }
    .btn-delete:hover { background: var(--apple-red); color: white; }
    .btn-view { background: rgba(0,102,204,0.08); color: var(--apple-blue); }
    .btn-view:hover { background: var(--apple-blue); color: white; }

    .avatar-sm {
      width: 32px; height: 32px;
      border-radius: 50%;
      object-fit: cover;
      background: #e0e0e0;
    }

    .stat-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      box-shadow: var(--apple-shadow);
      padding: 20px 24px;
    }
    .stat-num { font-size: 1.8rem; font-weight: 700; }
    .stat-label { font-size: 0.82rem; color: var(--apple-secondary); margin-top: 2px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--apple-secondary);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 12px; }

    @media (max-width: 768px) {
      .stat-cards { grid-template-columns: repeat(2, 1fr); }
      .table { font-size: 0.85rem; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="admin-header">
    <div>
      <h1 class="admin-title">🛡️ 管理中心</h1>
      <a href="/browse-post" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg> 返回广场</a>
    </div>
    <div id="navButtons"></div>
  </div>

  <div id="accessDenied" class="card p-5 text-center d-none">
    <h3 style="color:var(--apple-red)">⚠️ 无权限访问</h3>
    <p class="text-secondary mt-2">仅管理员可访问此页面</p>
    <a href="/browse-post" class="btn btn-primary mt-3 rounded-pill px-4">返回首页</a>
  </div>

  <div id="adminContent">
    <div class="stat-cards">
      <div class="stat-card">
        <div class="stat-num" id="statUsers">-</div>
        <div class="stat-label">总用户数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statPosts">-</div>
        <div class="stat-label">总帖子数</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statTargets">-</div>
        <div class="stat-label">评论对象</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statComments">-</div>
        <div class="stat-label">总评论数</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="users">👥 用户管理</button>
      <button class="tab-btn" data-tab="posts">📝 帖子管理</button>
      <button class="tab-btn" data-tab="targets">🎯 评论对象</button>
      <button class="tab-btn" data-tab="comments">💬 评论管理</button>
      <button class="tab-btn" data-tab="bannedwords">🚫 违禁词</button>
    </div>

    <div id="usersTab">
      <div class="card">
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>头像</th><th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th>
            </tr></thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="postsTab" class="d-none">
      <div class="card">
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>ID</th><th>标题</th><th>作者</th><th>标签</th><th>发布时间</th><th>操作</th>
            </tr></thead>
            <tbody id="postsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="targetsTab" class="d-none">
      <div class="card">
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>ID</th><th>对象名称</th><th>所属帖子</th><th>帖子作者</th><th>评论数</th><th>创建时间</th><th>操作</th>
            </tr></thead>
            <tbody id="targetsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="commentsTab" class="d-none">
      <div class="card">
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>ID</th><th>评论者</th><th>内容</th><th>评分</th><th>所属对象</th><th>所属帖子</th><th>时间</th><th>操作</th>
            </tr></thead>
            <tbody id="commentsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="bannedwordsTab" class="d-none">
      <div class="card mb-3">
        <div class="card-body p-4">
          <div class="d-flex gap-2">
            <input type="text" id="newBannedWord" class="form-control" placeholder="输入违禁词，按回车添加..." style="border-radius:10px;border:1.5px solid #e0e0e0;padding:8px 16px" />
            <button class="btn btn-primary" style="border-radius:10px;padding:8px 20px;white-space:nowrap" onclick="addBannedWord()">添加</button>
          </div>
          <div style="font-size:0.82rem;color:var(--apple-secondary);margin-top:8px">添加后，帖子标题/内容、评论对象名称、评论内容中包含违禁词将不允许发布</div>
        </div>
      </div>
      <div class="card">
        <div class="table-responsive">
          <table class="table">
            <thead><tr>
              <th>ID</th><th>违禁词</th><th>添加时间</th><th>操作</th>
            </tr></thead>
            <tbody id="bannedWordsTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    const token = localStorage.getItem('token');
    const tokenType = localStorage.getItem('tokenType') || 'Bearer';
    const username = localStorage.getItem('username') || '';
    const role = localStorage.getItem('role') || 'user';

    if (!token) { location.href = '/browse-post'; return; }
    if (role !== 'admin' && role !== 'super_admin') {
      document.getElementById('accessDenied').classList.remove('d-none');
      document.getElementById('adminContent').style.display = 'none';
      renderNavButtons();
      return;
    }

    const headers = { 'Authorization': `${tokenType} ${token}` };

    const setMsg = (el, text, type) => {
      el.className = `alert alert-${type} py-2 small`;
      el.textContent = text;
    };

    window.handleLogout = () => {
      if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('token');
        localStorage.removeItem('tokenType');
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        location.href = '/browse-post';
      }
    };

    const renderNavButtons = () => {
      const nb = document.getElementById('navButtons');
      nb.innerHTML = `<div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:0.85rem;color:var(--apple-secondary)">${username}</span>
        <span class="badge-role-admin">管理员</span>
        <button class="btn btn-outline-secondary btn-sm btn-pill px-3" onclick="location.href='/settings'">⚙️</button>
      </div>`;
    };

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.getElementById('usersTab').classList.toggle('d-none', tab !== 'users');
        document.getElementById('postsTab').classList.toggle('d-none', tab !== 'posts');
        document.getElementById('targetsTab').classList.toggle('d-none', tab !== 'targets');
        document.getElementById('commentsTab').classList.toggle('d-none', tab !== 'comments');
        document.getElementById('bannedwordsTab').classList.toggle('d-none', tab !== 'bannedwords');
        if (tab === 'targets' && !targetsLoaded) { loadTargets(); targetsLoaded = true; }
        if (tab === 'comments' && !commentsLoaded) { loadComments(); commentsLoaded = true; }
        if (tab === 'bannedwords' && !bannedWordsLoaded) { loadBannedWords(); bannedWordsLoaded = true; }
      };
    });

    let targetsLoaded = false, commentsLoaded = false, bannedWordsLoaded = false;
    let currentRole = 'admin';

    const fetchRole = async () => {
      try {
        const res = await fetch('/admin/role', { headers });
        const result = await res.json();
        if (result.code === 200) currentRole = result.data;
      } catch(e) {}
    };

    const roleLabel = (role) => {
      if (role === 'super_admin') return '<span class="badge-role-admin" style="background:#ff4757;color:#fff">超级管理员</span>';
      if (role === 'admin') return '<span class="badge-role-admin">管理员</span>';
      return '<span class="badge-role-user">用户</span>';
    };

    // Load users
    const loadUsers = async () => {
      try {
        const res = await fetch('/admin/users', { headers });
        const result = await res.json();
        const body = document.getElementById('usersTableBody');
        if (result.code === 200 && result.data.length) {
          body.innerHTML = result.data.map(u => {
            const isSelf = u.username === username;
            const isSuperAdmin = u.role === 'super_admin';
            let actions = '';
            if (isSelf) {
              actions = '<span style="color:var(--apple-secondary);font-size:0.82rem">—</span>';
            } else if (isSuperAdmin) {
              actions = '<span style="color:var(--apple-secondary);font-size:0.82rem">超级管理员</span>';
            } else {
              actions = `<button class="btn-action btn-mute" onclick="toggleMute('${u.username}', '${u.status}')">${u.status === 'muted' ? '解除禁言' : '禁言'}</button>
                <button class="btn-action btn-delete" onclick="deleteUser('${u.username}')">注销账号</button>`;
              if (currentRole === 'super_admin') {
                if (u.role === 'admin') {
                  actions += ` <button class="btn-action" style="background:#ff6b6b;color:#fff" onclick="demoteUser('${u.username}')">剥夺管理员</button>`;
                } else {
                  actions += ` <button class="btn-action" style="background:#2ed573;color:#fff" onclick="promoteUser('${u.username}')">设为管理员</button>`;
                }
              }
            }
            return `<tr>
              <td><img class="avatar-sm" src="${u.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(u.username)}" alt=""></td>
              <td><strong>${u.username}</strong>${isSelf ? ' <span style="font-size:0.75rem;color:var(--apple-secondary)">(你)</span>' : ''}</td>
              <td>${roleLabel(u.role)}</td>
              <td><span class="${u.status === 'muted' ? 'badge-status-muted' : 'badge-status-active'}">${u.status === 'muted' ? '已禁言' : '正常'}</span></td>
              <td style="color:var(--apple-secondary);font-size:0.85rem">${u.createdAt ? (u.createdAt.includes('T') ? u.createdAt.split('T')[0] : u.createdAt.split(' ')[0]) : '-'}</td>
              <td>${actions}</td>
            </tr>`;
          }).join('');
          document.getElementById('statUsers').textContent = result.data.length;
        } else {
          body.innerHTML = '<tr><td colspan="6" class="empty-state">暂无用户数据</td></tr>';
          document.getElementById('statUsers').textContent = '0';
        }
      } catch(e) { console.error(e); }
    };

    // Load posts
    const loadPosts = async () => {
      try {
        const res = await fetch('/admin/posts', { headers });
        const result = await res.json();
        const body = document.getElementById('postsTableBody');
        if (result.code === 200 && result.data.length) {
          document.getElementById('statPosts').textContent = result.data.length;
          body.innerHTML = result.data.map(p => `
            <tr>
              <td style="color:var(--apple-secondary)">${p.id}</td>
              <td><strong style="max-width:280px;display:inline-block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:bottom">${p.title}</strong></td>
              <td>${p.username}</td>
              <td>${p.tag ? `<span style="background:#f0f0f2;padding:2px 8px;border-radius:4px;font-size:0.8rem">#${p.tag}</span>` : '<span style="color:var(--apple-secondary)">—</span>'}</td>
              <td style="color:var(--apple-secondary);font-size:0.85rem">${p.createdAt ? p.createdAt.split('T')[0] : '-'}</td>
              <td>
                <a href="/post-detail?id=${p.id}&from=admin" class="btn-action btn-view">查看</a>
                <button class="btn-action btn-delete" onclick="deletePost(${p.id})">删除</button>
              </td>
            </tr>`).join('');
        } else {
          body.innerHTML = '<tr><td colspan="6" class="empty-state">暂无帖子数据</td></tr>';
          document.getElementById('statPosts').textContent = '0';
        }
      } catch(e) { console.error(e); }
    };

    // Actions
    window.toggleMute = async (uname, currentStatus) => {
      if (!confirm(`确定要${currentStatus === 'muted' ? '解除禁言' : '禁言'}用户「${uname}」吗？`)) return;
      try {
        const res = await fetch(`/admin/user/${uname}/mute`, { method: 'POST', headers });
        const result = await res.json();
        if (result.code === 200) { loadUsers(); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    window.deleteUser = async (uname) => {
      if (!confirm(`⚠️ 确定要注销用户「${uname}」的账号吗？此操作不可恢复！`)) return;
      try {
        const res = await fetch(`/admin/user/${uname}`, { method: 'DELETE', headers });
        const result = await res.json();
        if (result.code === 200) { loadUsers(); alert('✅ 用户已注销'); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    window.promoteUser = async (uname) => {
      if (!confirm(`确定要将用户「${uname}」升级为管理员吗？`)) return;
      try {
        const res = await fetch(`/admin/user/${uname}/promote`, { method: 'POST', headers });
        const result = await res.json();
        if (result.code === 200) { loadUsers(); alert('✅ 已升级为管理员'); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    window.demoteUser = async (uname) => {
      if (!confirm(`确定要剥夺用户「${uname}」的管理员权限吗？`)) return;
      try {
        const res = await fetch(`/admin/user/${uname}/demote`, { method: 'POST', headers });
        const result = await res.json();
        if (result.code === 200) { loadUsers(); alert('✅ 已剥夺管理员权限'); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    window.deletePost = async (pid) => {
      if (!confirm('⚠️ 确定要删除该帖子吗？\n\n这将同时删除该帖子的所有评论对象和评论！')) return;
      try {
        const res = await fetch(`/admin/post/${pid}`, { method: 'DELETE', headers });
        const result = await res.json();
        if (result.code === 200) { loadPosts(); alert('✅ ' + result.message); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    // Load review targets
    const loadTargets = async () => {
      console.log('🎯 [DEBUG] 开始加载评论对象...');
      try {
        console.log('🎯 [DEBUG] 请求URL: /admin/review-targets');
        console.log('🎯 [DEBUG] Headers:', headers);
        const res = await fetch('/admin/review-targets', { headers });
        console.log('🎯 [DEBUG] 响应状态:', res.status);
        const result = await res.json();
        console.log('🎯 [DEBUG] API返回数据:', result);
        const body = document.getElementById('targetsTableBody');
        if (result.code === 200 && result.data && result.data.length) {
          document.getElementById('statTargets').textContent = result.data.length;
          body.innerHTML = result.data.map(t => `
            <tr>
              <td style="color:var(--apple-secondary)">${t.id}</td>
              <td><strong>${t.targetName}</strong></td>
              <td><a href="/post-detail?id=${t.postId}&from=admin" style="color:var(--apple-blue);text-decoration:none">${t.postTitle}</a></td>
              <td>${t.postAuthor}</td>
              <td><span class="badge bg-info text-dark">${t.commentCount} 条</span></td>
              <td style="color:var(--apple-secondary);font-size:0.85rem">${t.createdAt ? t.createdAt.split('T')[0] : '-'}</td>
              <td>
                <a href="/review-target-detail?id=${t.id}&from=admin" class="btn-action btn-view">查看</a>
                <button class="btn-action btn-delete" onclick="deleteTarget(${t.id}, '${t.targetName}')">删除</button>
              </td>
            </tr>`).join('');

          console.log(`✅ 🎯 成功加载 ${result.data.length} 条评论对象`);
        } else {
          body.innerHTML = '<tr><td colspan="7" class="empty-state">暂无评论对象数据</td></tr>';
          document.getElementById('statTargets').textContent = '0';
          console.log('⚠️ 🎯 评论对象数据为空或格式异常:', result);
        }
      } catch(e) {
        console.error('❌ 🎯 加载评论对象失败:', e);
        document.getElementById('targetsTableBody').innerHTML = '<tr><td colspan="7" class="empty-state">加载失败</td></tr>';
      }
    };

    // Load comments
    const loadComments = async () => {
      console.log('💬 [DEBUG] 开始加载评论...');
      try {
        console.log('💬 [DEBUG] 请求URL: /admin/comments');
        console.log('💬 [DEBUG] Headers:', headers);
        const res = await fetch('/admin/comments', { headers });
        console.log('💬 [DEBUG] 响应状态:', res.status);
        const result = await res.json();
        console.log('💬 [DEBUG] API返回数据:', result);
        const body = document.getElementById('commentsTableBody');
        if (result.code === 200 && result.data && result.data.length) {
          document.getElementById('statComments').textContent = result.data.length;
          body.innerHTML = result.data.map(c => `
            <tr>
              <td style="color:var(--apple-secondary)">${c.id}</td>
              <td><strong>${c.username}</strong></td>
              <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.content || '-'}</td>
              <td>${c.score != null ? `⭐ ${c.score}` : '<span style="color:var(--apple-secondary)">未评分</span>'}</td>
              <td><a href="/review-target-detail?id=${c.reviewTargetId}&from=admin" style="color:var(--apple-blue);text-decoration:none;font-size:0.85rem">${c.targetName}</a></td>
              <td><a href="/post-detail?id=${c.postId}&from=admin" style="color:var(--apple-secondary);text-decoration:none;font-size:0.85rem">${c.postTitle}</a></td>
              <td style="color:var(--apple-secondary);font-size:0.85rem">${c.createdAt ? c.createdAt.split('T')[0] : '-'}</td>
              <td><button class="btn-action btn-delete" onclick="deleteComment(${c.id})">删除</button></td>
            </tr>`).join('');
          console.log(`✅ 💬 成功加载 ${result.data.length} 条评论`);
        } else {
          body.innerHTML = '<tr><td colspan="8" class="empty-state">暂无评论数据</td></tr>';
          document.getElementById('statComments').textContent = '0';
          console.log('⚠️ 💬 评论数据为空或格式异常:', result);
        }
      } catch(e) {
        console.error('❌ 💬 加载评论失败:', e);
        document.getElementById('commentsTableBody').innerHTML = '<tr><td colspan="8" class="empty-state">加载失败</td></tr>';
      }
    };

    window.deleteTarget = async (targetId, targetName) => {
      if (!confirm(`⚠️ 确定要删除评论对象「${targetName}」吗？\n\n这将同时删除该对象下的所有评论！`)) return;
      try {
        const res = await fetch(`/admin/review-target/${targetId}`, { method: 'DELETE', headers });
        const result = await res.json();
        if (result.code === 200) { loadTargets(); alert('✅ ' + result.message); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    window.deleteComment = async (commentId) => {
      if (!confirm('确定要删除这条评论吗？')) return;
      try {
        const res = await fetch(`/admin/comment/${commentId}`, { method: 'DELETE', headers });
        const result = await res.json();
        if (result.code === 200) { loadComments(); alert('✅ 评论已删除'); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    // Load banned words
    const loadBannedWords = async () => {
      try {
        const res = await fetch('/admin/banned-words', { headers });
        const result = await res.json();
        const body = document.getElementById('bannedWordsTableBody');
        if (result.code === 200 && result.data && result.data.length) {
          body.innerHTML = result.data.map(w => `
            <tr>
              <td style="color:var(--apple-secondary)">${w.id}</td>
              <td><strong style="color:var(--apple-red)">${w.word}</strong></td>
              <td style="color:var(--apple-secondary);font-size:0.85rem">${w.createdAt ? w.createdAt.split(' ')[0] : '-'}</td>
              <td><button class="btn-action btn-delete" onclick="deleteBannedWord(${w.id}, '${w.word}')">删除</button></td>
            </tr>`).join('');
        } else {
          body.innerHTML = '<tr><td colspan="4" class="empty-state">暂无违禁词，请添加</td></tr>';
        }
      } catch(e) {
        console.error(e);
        document.getElementById('bannedWordsTableBody').innerHTML = '<tr><td colspan="4" class="empty-state">加载失败</td></tr>';
      }
    };

    window.addBannedWord = async () => {
      const input = document.getElementById('newBannedWord');
      const word = input.value.trim();
      if (!word) { alert('请输入违禁词'); return; }
      try {
        const res = await fetch('/admin/banned-words', {
          method: 'POST',
          headers: { ...headers, 'Content-Type': 'application/json' },
          body: JSON.stringify({ word })
        });
        const result = await res.json();
        if (result.code === 200) {
          input.value = '';
          loadBannedWords();
        } else {
          alert(result.message || '添加失败');
        }
      } catch(e) { alert('网络错误'); }
    };

    window.deleteBannedWord = async (id, word) => {
      if (!confirm(`确定要删除违禁词「${word}」吗？`)) return;
      try {
        const res = await fetch(`/admin/banned-words/${id}`, { method: 'DELETE', headers });
        const result = await res.json();
        if (result.code === 200) { loadBannedWords(); }
        else { alert(result.message || '操作失败'); }
      } catch(e) { alert('网络错误'); }
    };

    document.getElementById('newBannedWord').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.addBannedWord();
    });

    renderNavButtons();
    fetchRole().then(() => {
      loadUsers();
      loadPosts();
      loadTargets();
      loadComments();
    });
  })();
</script>
</body>
</html>
