<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子详情 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/app.css}" rel="stylesheet" />
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font); }
  </style>
</head>
<body>
<div class="bento-container">
  <aside class="bento-sidebar" id="mainSidebar">
    <div class="bento-card sidebar-profile-card">
      <div class="sidebar-avatar" id="sidebarAvatar">U</div>
      <div class="sidebar-username" id="sidebarUsername">用户</div>
      <div class="sidebar-bio" id="sidebarBio">分享校园生活</div>
    </div>
    <div class="bento-card sidebar-nav">
      <button class="sidebar-nav-item" onclick="location.href='/browse-post'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/categories'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>分类
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/ranking'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>排行
      </button>
      <button class="sidebar-nav-item" id="adminNavBtn" style="display:none" onclick="location.href='/admin'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>管理
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/profile'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>个人中心
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/settings'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置
      </button>
      <button class="sidebar-nav-item" id="sidebarLogoutBtn" style="display:none;color:var(--red)" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录
      </button>
    </div>
    <div class="bento-card bento-card-sm" id="sidebarLoginArea" style="display:none">
      <div class="bento-card-body text-center">
        <p class="text-secondary text-sm m-0">登录以解锁全部功能</p>
        <div class="flex gap-2 justify-center mt-3">
          <button class="btn btn-primary btn-sm" onclick="showLoginPrompt()">登录</button>
          <button class="btn btn-secondary btn-sm" onclick="showRegisterPrompt()">注册</button>
        </div>
      </div>
    </div>
  </aside>

  <script>
    (function(){
      var u = localStorage.getItem('username');
      if (u) {
        document.getElementById('sidebarUsername').textContent = u;
        document.getElementById('sidebarAvatar').textContent = u.charAt(0).toUpperCase();
        document.getElementById('sidebarBio').textContent = '';
        document.getElementById('sidebarLoginArea').style.display = 'none';
        document.getElementById('sidebarLogoutBtn').style.display = 'flex';
        var r = localStorage.getItem('role') || 'user';
        if (r === 'admin' || r === 'super_admin') {
          var ab = document.getElementById('adminNavBtn');
          if (ab) ab.style.display = 'flex';
        }
      } else {
        document.getElementById('sidebarLoginArea').style.display = 'block';
        document.getElementById('sidebarLogoutBtn').style.display = 'none';
      }
    })();
  </script>

  <main class="bento-main">
    <div class="bento-header">
      <div class="bento-header-left">
        <h1>帖子详情</h1>
        <p>
          <a href="javascript:void(0)" onclick="handleBack()" style="color:var(--sapphire);text-decoration:none;font-weight:500">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:2px"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
            <span id="backText">返回广场</span>
          </a>
        </p>
      </div>
    </div>

    <div id="msg" class="alert d-none" role="alert"></div>

    <div class="detail-card" id="postDetail">
      <div class="d-flex justify-content-between align-items-start gap-3">
        <div class="detail-title" id="postTitle"></div>
        <div id="postTag"></div>
      </div>
      <div class="detail-meta" id="postMeta"></div>
      <div id="postImage" class="detail-card-image d-none">
        <img id="postImageSrc" src="" alt="配图" style="cursor:zoom-in">
      </div>
      <div class="detail-content" id="postContent"></div>
    </div>

    <div class="d-flex justify-content-between align-items-center mt-5 mb-4">
      <h3 class="fw-bold m-0">评论对象</h3>
      <button class="btn btn-primary" onclick="showAddTarget()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:4px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>添加对象
      </button>
    </div>

    <div id="addTargetForm" class="detail-card d-none mb-4">
      <form id="targetForm">
        <div class="mb-3">
          <label for="targetNameInput" class="form-label fw-semibold text-sm">对象名称</label>
          <input type="text" id="targetNameInput" class="f-input" placeholder="例如：史蒂芬·库里" required>
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" class="btn btn-ghost" onclick="hideAddTarget()">取消</button>
          <button type="submit" class="btn btn-primary">创建对象</button>
        </div>
      </form>
    </div>

    <div id="targetList" class="d-grid gap-3"></div>
  </main>
</div>

<div class="detail-lightbox" id="lightbox">
  <img src="" alt="查看大图" id="lightboxImg">
</div>

<div class="modal fade auth-modal" id="loginModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">登录</h5>
        <p class="modal-subtitle">欢迎回到校圈</p>
      </div>
      <div class="modal-body">
        <div id="loginModalMsg" class="alert d-none mb-3" role="alert"></div>
        <form id="loginForm">
          <div class="mb-3"><input type="text" id="loginUsername" class="form-control" placeholder="用户名" required></div>
          <div class="mb-4"><input type="password" id="loginPassword" class="form-control" placeholder="密码" required></div>
          <button type="submit" class="btn-submit mb-3">登录</button>
          <div class="text-center" style="font-size:0.88rem"><span class="text-secondary">还没有账号？</span><a href="javascript:void(0)" onclick="switchModal('register')" class="switch-link">立即注册</a></div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade auth-modal" id="registerModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">注册</h5>
        <p class="modal-subtitle">加入校圈社区</p>
      </div>
      <div class="modal-body">
        <div id="registerModalMsg" class="alert d-none mb-3" role="alert"></div>
        <form id="registerForm">
          <div class="mb-3"><input type="text" id="registerUsername" class="form-control" placeholder="设置用户名" required></div>
          <div class="mb-4"><input type="password" id="registerPassword" class="form-control" placeholder="设置密码 (至少6位)" required></div>
          <button type="submit" class="btn-submit mb-3">注册</button>
          <div class="text-center" style="font-size:0.88rem"><span class="text-secondary">已有账号？</span><a href="javascript:void(0)" onclick="switchModal('login')" class="switch-link">返回登录</a></div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    document.querySelectorAll('.sidebar-nav-item').forEach(item => {
      const orig = item.getAttribute('onclick');
      if (!orig || !orig.includes('location.href')) return;
      item.removeAttribute('onclick');
      item.addEventListener('click', function(e) {
        e.preventDefault();
        let url = '';
        const match = orig.match(/location\.href\s*=\s*['"]([^'"]+)['"]/);
        if (match) {
          url = match[1];
        } else {
          const funcMatch = orig.match(/location\.href\s*=\s*(\S+)/);
          if (funcMatch) {
            url = funcMatch[1].replace(/[();\s]+$/, '');
          }
        }
        if (!url) return;
        document.body.classList.add('page-transitioning');
        setTimeout(() => { 
          window.location.href = url;
        }, 120);
      });
    });

    const postDetail = document.getElementById('postDetail');
    const targetList = document.getElementById('targetList');
    const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
    const registerModal = new bootstrap.Modal(document.getElementById('registerModal'));

    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();
    const username = localStorage.getItem('username') || '';

    const getPostId = () => new URLSearchParams(window.location.search).get('id');
    const getSource = () => new URLSearchParams(window.location.search).get('from') || '';
    const setMsg = (el, text, type) => { if(el) { el.className = 'alert d-block alert-' + type + ' py-2 small'; el.textContent = text; } };

    const SCORE_LABELS = { 1: '拉完了', 2: 'NPC', 3: '人上人', 4: '顶级', 5: '夯' };
    const getScoreLabel = (s) => {
      if (s == null || isNaN(s)) return '--';
      if (s < 2) return '拉完了';
      if (s < 3) return 'NPC';
      if (s < 4) return '人上人';
      if (s < 4.5) return '顶级';
      return '夯';
    };

    const initSidebar = async () => {
      if (!token) {
        document.getElementById('sidebarLoginArea').style.display = '';
        return;
      }
      document.getElementById('sidebarLoginArea').style.display = 'none';
      document.getElementById('sidebarLogoutBtn').style.display = '';
      const role = localStorage.getItem('role') || 'user';
      if (role === 'admin' || role === 'super_admin') {
        document.getElementById('adminNavBtn').style.display = '';
      }
      try {
        const res = await fetch('/user/profile', {
          headers: { 'Authorization': `${tokenType} ${token}` }
        });
        const result = await res.json();
        if (result.code === 200) {
          const data = result.data;
          document.getElementById('sidebarUsername').textContent = data.username || username;
          document.getElementById('sidebarBio').textContent = data.signature || '';
          const avatarEl = document.getElementById('sidebarAvatar');
          if (data.avatar) {
            avatarEl.innerHTML = `<img src="${data.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
          } else {
            avatarEl.textContent = (data.username || username).charAt(0).toUpperCase();
          }
        }
      } catch(e) { console.error(e); }
    };

    window.switchModal = (to) => {
      if (to === 'register') { loginModal.hide(); setTimeout(() => registerModal.show(), 400); }
      else { registerModal.hide(); setTimeout(() => loginModal.show(), 400); }
    };
    window.showLoginPrompt = (msg) => { loginModal.show(); if (msg) setMsg(document.getElementById('loginModalMsg'), msg, 'warning'); };
    window.showRegisterPrompt = () => registerModal.show();
    window.handleLogout = () => { if (confirm('确定要退出登录吗？')) { localStorage.removeItem('token'); localStorage.removeItem('tokenType'); localStorage.removeItem('username'); localStorage.removeItem('role'); location.reload(); } };

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('loginUsername').value.trim();
      const p = document.getElementById('loginPassword').value;
      const res = await fetch('/user/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
      const result = await res.json();
      if (res.ok && result.code === 200) { localStorage.setItem('token', result.data.token); localStorage.setItem('tokenType', result.data.tokenType || 'Bearer'); localStorage.setItem('username', result.data.username || u); localStorage.setItem('role', result.data.role || 'user'); location.reload(); }
      else setMsg(document.getElementById('loginModalMsg'), result.message || '登录失败', 'danger');
    });
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('registerUsername').value.trim();
      const p = document.getElementById('registerPassword').value;
      if (p.length < 6) return setMsg(document.getElementById('registerModalMsg'), '密码至少需要6位', 'danger');
      const res = await fetch('/user/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
      const result = await res.json();
      if (res.ok && result.code === 200) {
        localStorage.setItem('token', result.data.token);
        localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
        localStorage.setItem('username', result.data.username || u);
        localStorage.setItem('role', result.data.role || 'user');
        setMsg(document.getElementById('registerModalMsg'), '注册成功', 'success');
        setTimeout(() => location.reload(), 800);
      }
      else setMsg(document.getElementById('registerModalMsg'), result.message || '注册失败', 'danger');
    });

    const loadPostDetail = async () => {
      const postId = getPostId();
      if (!postId) return;
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;
      try {
        const res = await fetch(`/post/${postId}`, { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          const post = result.data;
          document.getElementById('postTitle').textContent = post.title;
          if (post.tag) document.getElementById('postTag').innerHTML = `<span class="tag-badge">#${post.tag}</span>`;
          document.getElementById('postMeta').textContent = `${post.username || '未知'} · ${post.createdAt || ''}`;
          if (post.imageUrl) {
            document.getElementById('postImageSrc').src = post.imageUrl;
            document.getElementById('postImage').classList.remove('d-none');
          }
          document.getElementById('postContent').textContent = post.content;
        }
      } catch (e) { console.error(e); }
    };

    const loadReviewTargets = async () => {
      const postId = getPostId();
      const source = getSource();
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;
      try {
        const res = await fetch(`/post/${postId}/review-targets`, { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          const targets = result.data || [];
          if (!targets.length) { targetList.innerHTML = '<div class="text-center text-muted py-5">暂无评论对象</div>'; return; }
          targets.sort((a, b) => {
            const sa = a.avgScore != null ? a.avgScore : -1;
            const sb = b.avgScore != null ? b.avgScore : -1;
            return sb - sa;
          });
          const fromParam = source ? `&from=${source}` : '';
          targetList.innerHTML = targets.map(t => `
            <div class="target-card" onclick="location.href='/review-target-detail?id=${t.id}${fromParam}'">
              <div class="d-flex justify-content-between align-items-center">
                <div class="target-card-name">${t.targetName}</div>
                ${t.avgScore ? `<div class="tag-badge tag-badge-green" title="平均分 ${t.avgScore.toFixed(1)}">${getScoreLabel(t.avgScore)}</div>` : '<div class="text-secondary small">暂无评分</div>'}
              </div>
              <div class="text-secondary small mt-1">${t.commentCount} 条评论</div>
            </div>
          `).join('');
        }
      } catch (e) { console.error(e); }
    };

    window.showAddTarget = () => {
      if (!token) return showLoginPrompt('请先登录后再添加评论对象');
      document.getElementById('addTargetForm').classList.remove('d-none');
    };
    window.hideAddTarget = () => document.getElementById('addTargetForm').classList.add('d-none');

    document.getElementById('targetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('targetNameInput').value.trim();
      const postId = getPostId();
      const res = await fetch(`/post/${postId}/review-target`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `${tokenType} ${token}` }, body: JSON.stringify({ targetName: name }) });
      const result = await res.json();
      if (result.code === 200) { hideAddTarget(); loadReviewTargets(); }
      else { alert(result.message || '创建失败'); }
    });

    const setupBackButton = () => {
      const source = getSource();
      const backText = document.getElementById('backText');
      switch(source) {
        case 'categories': backText.textContent = '返回分类区'; break;
        case 'ranking': backText.textContent = '返回排行区'; break;
        case 'search': backText.textContent = '返回搜索'; break;
        case 'admin': backText.textContent = '返回管理后台'; break;
        case 'profile': backText.textContent = '返回个人中心'; break;
        default: backText.textContent = '返回广场';
      }
    };

    window.handleBack = () => {
      const source = getSource();
      switch(source) {
        case 'categories': location.href = '/categories'; break;
        case 'ranking': location.href = '/ranking'; break;
        case 'search': location.href = '/search'; break;
        case 'admin': location.href = '/admin'; break;
        case 'profile': location.href = '/profile'; break;
        default: location.href = '/browse-post';
      }
    };

    initSidebar();
    setupBackButton();
    loadPostDetail();
    loadReviewTargets();

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    document.getElementById('postImageSrc').onclick = (e) => {
      e.stopPropagation();
      lightboxImg.src = e.target.src;
      lightbox.classList.add('show');
    };
    lightbox.onclick = () => { lightbox.classList.remove('show'); };
  })();
</script>
</body>
</html>
