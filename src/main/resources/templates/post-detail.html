<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子详情 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: #f8fafc; }
    .wrap { max-width: 760px; margin: 24px auto; padding: 0 16px; }
    .post-card { border: 0; border-radius: 14px; box-shadow: 0 8px 20px rgba(15,23,42,0.06); margin-bottom: 24px; }
    .post-title { font-weight: 700; color: #0f172a; }
    .meta { color: #64748b; font-size: 13px; }
    .content { color: #334155; white-space: pre-wrap; line-height: 1.6; }
    .target-card { border: 0; border-radius: 12px; box-shadow: 0 4px 12px rgba(15,23,42,0.04); cursor: pointer; transition: transform 0.2s; }
    .target-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(15,23,42,0.08); }
    .target-name { font-weight: 600; color: #0f172a; font-size: 16px; }
    .score-badge { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: white; }
    .btn-primary { border-radius: 12px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h4 m-0">帖子详情</h1>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-primary btn-sm" href="/browse-post">返回广场</a>
      <a class="btn btn-outline-secondary btn-sm" href="/login">登录页</a>
    </div>
  </div>

  <div id="msg" class="alert d-none" role="alert"></div>

  <!-- 帖子详情 -->
  <div id="postDetail" class="card post-card">
    <div class="card-body">
      <div class="d-flex justify-content-between align-items-start gap-3">
        <div class="post-title" id="postTitle">加载中...</div>
        <div id="postTag"></div>
      </div>
      <div class="meta mt-1" id="postMeta">作者：加载中 · 加载中</div>
      <div id="postImage" class="mt-3 d-none"><img id="postImageSrc" src="" alt="帖子图片" class="img-fluid rounded" style="max-height: 300px;"></div>
      <div class="content mt-3" id="postContent">加载中...</div>
    </div>
  </div>

  <!-- 评论对象列表 -->
  <div class="mb-3 d-flex justify-content-between align-items-center">
    <h5 class="fw-semibold m-0">评论对象</h5>
    <button id="addTargetBtn" class="btn btn-primary btn-sm">+ 添加评论对象</button>
  </div>

  <!-- 添加评论对象表单 -->
  <div id="addTargetForm" class="card mb-3 d-none">
    <div class="card-body">
      <form id="targetForm">
        <div class="mb-2">
          <input type="text" id="targetNameInput" class="form-control" placeholder="输入评论对象名称（如：史蒂芬·库里）" maxlength="100" required />
        </div>
        <div class="d-flex gap-2 justify-content-end">
          <button type="button" id="cancelTargetBtn" class="btn btn-outline-secondary btn-sm">取消</button>
          <button type="submit" class="btn btn-primary btn-sm">创建</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 评论对象列表 -->
  <div id="targetList" class="d-grid gap-3"></div>
</div>

<script>
  (() => {
    const msg = document.getElementById('msg');
    const postTitle = document.getElementById('postTitle');
    const postMeta = document.getElementById('postMeta');
    const postContent = document.getElementById('postContent');
    const targetList = document.getElementById('targetList');
    const addTargetBtn = document.getElementById('addTargetBtn');
    const addTargetForm = document.getElementById('addTargetForm');
    const targetForm = document.getElementById('targetForm');
    const targetNameInput = document.getElementById('targetNameInput');
    const cancelTargetBtn = document.getElementById('cancelTargetBtn');

    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();

    const setMsg = (text, type) => {
      msg.className = 'alert d-block alert-' + type;
      msg.textContent = text;
    };

    const clearMsg = () => {
      msg.className = 'alert d-none';
      msg.textContent = '';
    };

    const redirectToLogin = () => {
      sessionStorage.setItem('authMsg', '请先登录后查看帖子');
      location.href = '/login';
    };

    const getPostId = () => {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get('id');
    };

    const loadPostDetail = async () => {
      const postId = getPostId();
      if (!postId) {
        setMsg('帖子ID不存在', 'danger');
        return;
      }

      try {
        const res = await fetch(`/post/${postId}`, {
          method: 'GET',
          headers: {
            'Authorization': tokenType + ' ' + token
          }
        });
        const result = await res.json().catch(() => null);

        if (res.status === 401) {
          redirectToLogin();
          return;
        }

        if (!res.ok || !result || result.code !== 200) {
          const err = (result && result.message) ? result.message : ('加载失败（' + res.status + '）');
          setMsg(err, 'danger');
          return;
        }

        const post = result.data;
        postTitle.textContent = post.title || '无标题';

        const postTag = document.getElementById('postTag');
        if (post.tag) {
          postTag.innerHTML = '<span class="badge bg-primary text-white">#' + post.tag + '</span>';
        }

        postMeta.textContent = `作者：${post.username || '未知用户'} · ${post.createdAt || ''}`;

        const postImage = document.getElementById('postImage');
        const postImageSrc = document.getElementById('postImageSrc');
        if (post.imageUrl) {
          postImageSrc.src = post.imageUrl;
          postImage.classList.remove('d-none');
        } else {
          postImage.classList.add('d-none');
        }

        postContent.textContent = post.content || '';
      } catch (error) {
        setMsg('请求失败，请稍后重试', 'danger');
      }
    };

    const loadReviewTargets = async () => {
      const postId = getPostId();
      if (!postId) return;

      try {
        const res = await fetch(`/post/${postId}/review-targets`, {
          method: 'GET',
          headers: {
            'Authorization': tokenType + ' ' + token
          }
        });
        const result = await res.json().catch(() => null);

        if (res.status === 401) {
          redirectToLogin();
          return;
        }

        if (!res.ok || !result || result.code !== 200) {
          const err = (result && result.message) ? result.message : ('加载失败（' + res.status + '）');
          setMsg(err, 'danger');
          return;
        }

        const targets = result.data || [];

        if (!targets.length) {
          targetList.innerHTML = '<div class="text-center text-muted py-4">暂无评论对象，点击右上角添加</div>';
          return;
        }

        targetList.innerHTML = targets.map(target => {
          const scoreDisplay = target.avgScore != null ?
                  `<span class="badge score-badge">⭐${target.avgScore.toFixed(1)}</span>` :
                  '<span class="badge text-bg-light">未评分</span>';

          return (
                  '<div class="card target-card" onclick="window.location.href=\'/review-target-detail?id=' + target.id + '\'">' +
                  '<div class="card-body">' +
                  '<div class="d-flex justify-content-between align-items-start">' +
                  '<div class="target-name">' + target.targetName.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
                  scoreDisplay +
                  '</div>' +
                  '<div class="meta mt-2">' + target.commentCount + ' 条评论</div>' +
                  '</div>' +
                  '</div>'
          );
        }).join('');
      } catch (error) {
        setMsg('请求失败，请稍后再重试', 'danger');
      }
    };

    addTargetBtn.addEventListener('click', () => {
      if (!token) {
        redirectToLogin();
        return;
      }
      addTargetForm.classList.remove('d-none');
      targetNameInput.focus();
    });

    cancelTargetBtn.addEventListener('click', () => {
      addTargetForm.classList.add('d-none');
      targetNameInput.value = '';
    });

    targetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const postId = getPostId();
      if (!postId) return;

      const targetName = targetNameInput.value.trim();
      if (!targetName) {
        setMsg('评论对象名称不能为空', 'danger');
        return;
      }

      try {
        const res = await fetch(`/post/${postId}/review-target`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': tokenType + ' ' + token
          },
          body: JSON.stringify({ targetName })
        });
        const result = await res.json().catch(() => null);

        if (res.status === 401) {
          redirectToLogin();
          return;
        }

        if (!res.ok || !result || result.code !== 200) {
          const err = (result && result.message) ? result.message : ('创建失败（' + res.status + '）');
          setMsg(err, 'danger');
          return;
        }

        setMsg('创建成功', 'success');
        targetNameInput.value = '';
        addTargetForm.classList.add('d-none');
        setTimeout(() => {
          clearMsg();
          loadReviewTargets();
        }, 500);
      } catch (error) {
        setMsg('请求失败，请稍后重试', 'danger');
      }
    });

    // 加载数据
    loadPostDetail();
    loadReviewTargets();
  })();
</script>
</body>
</html>
