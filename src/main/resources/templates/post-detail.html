<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>帖子详情 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
        --apple-bg: #f5f5f7;
        --apple-card: #ffffff;
        --apple-text: #1d1d1f;
        --apple-secondary: #86868b;
        --apple-blue: #0066cc;
        --apple-radius: 18px;
        --apple-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    body { background: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    
    .detail-card { 
        border: none; 
        border-radius: 24px; 
        background: var(--apple-card);
        box-shadow: var(--apple-shadow);
        padding: 40px;
        margin-bottom: 30px;
    }
    .post-title { font-weight: 700; font-size: 2rem; letter-spacing: -0.02em; margin-bottom: 8px; }
    .meta { color: var(--apple-secondary); font-size: 0.9rem; margin-bottom: 24px; }
    .content { color: #333; line-height: 1.6; font-size: 1.1rem; white-space: pre-wrap; }
    
    .target-card { 
        border: none; 
        border-radius: 16px; 
        background: var(--apple-card);
        box-shadow: var(--apple-shadow);
        padding: 20px;
        cursor: pointer;
        transition: transform 0.2s;
        margin-bottom: 16px;
    }
    .target-card:hover { transform: scale(1.02); }
    .target-name { font-weight: 600; font-size: 1.1rem; }
    
    /* Apple Style Modal */
    .modal-content { 
        border: none; 
        border-radius: 28px; 
        box-shadow: 0 30px 60px rgba(0,0,0,0.12);
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }
    .modal-header { border: none; padding: 40px 40px 10px; flex-direction: column; align-items: center; }
    .modal-body { padding: 20px 40px 40px; }
    .form-control { 
        background: rgba(0, 0, 0, 0.05);
        border: none;
        border-radius: 12px;
        padding: 14px 16px;
        font-size: 16px;
    }
    .btn-apple { 
        background: var(--apple-blue);
        color: white;
        border: none;
        border-radius: 12px;
        padding: 14px;
        font-weight: 600;
        width: 100%;
    }
    .btn-pill { border-radius: 20px; padding: 6px 16px; font-weight: 500; font-size: 0.9rem; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 32px; height: 32px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #555; }
    .score-badge { background: #ff9500; color: white; border-radius: 8px; padding: 2px 8px; font-size: 0.85rem; font-weight: 600; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <div>
        <h1 class="h3 m-0 fw-bold">帖子详情</h1>
        <a href="/browse-post" class="text-decoration-none small" style="color: var(--apple-blue);">← 返回广场</a>
    </div>
    <div class="d-flex gap-3 align-items-center" id="navButtons"></div>
  </div>

  <div id="msg" class="alert d-none" role="alert"></div>

  <div id="postDetail" class="detail-card d-none">
    <div class="d-flex justify-content-between align-items-start">
        <div class="post-title" id="postTitle"></div>
        <div id="postTag"></div>
    </div>
    <div class="meta" id="postMeta"></div>
    <div id="postImage" class="mb-4 d-none"><img id="postImageSrc" src="" class="img-fluid rounded-4 shadow-sm w-100" style="max-height: 500px; object-fit: cover;"></div>
    <div class="content" id="postContent"></div>
  </div>

  <div class="mt-5 mb-4 d-flex justify-content-between align-items-center">
    <h3 class="fw-bold m-0">评论对象</h3>
    <button class="btn btn-primary btn-pill px-4" onclick="showAddTarget()">+ 添加对象</button>
  </div>

  <div id="addTargetForm" class="detail-card p-4 d-none mb-4">
    <form id="targetForm">
        <input type="text" id="targetNameInput" class="form-control mb-3" placeholder="对象名称 (如：史蒂芬·库里)" required>
        <div class="d-flex gap-2 justify-content-end">
            <button type="button" class="btn btn-light btn-pill px-4" onclick="hideAddTarget()">取消</button>
            <button type="submit" class="btn btn-primary btn-pill px-4">创建</button>
        </div>
    </form>
  </div>

  <div id="targetList" class="d-grid gap-3"></div>
</div>

<!-- Modals (Login/Register) -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="fw-bold m-0">登录</h3>
          <p class="text-secondary mt-2">欢迎回到校圈</p>
        </div>
        <div class="modal-body">
          <div id="loginModalMsg" class="alert d-none mb-3 py-2 small" role="alert"></div>
          <form id="loginForm">
            <div class="mb-3"><input type="text" id="loginUsername" class="form-control" placeholder="用户名" required></div>
            <div class="mb-4"><input type="password" id="loginPassword" class="form-control" placeholder="密码" required></div>
            <button type="submit" class="btn btn-apple mb-3">登录</button>
            <div class="text-center small"><span class="text-secondary">还没有账号？</span><a href="javascript:void(0)" onclick="switchModal('register')" class="text-decoration-none fw-bold" style="color: var(--apple-blue);">立即注册</a></div>
          </form>
        </div>
      </div>
    </div>
  </div>
  
  <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="fw-bold m-0">注册</h3>
          <p class="text-secondary mt-2">加入校圈社区</p>
        </div>
        <div class="modal-body">
          <div id="registerModalMsg" class="alert d-none mb-3 py-2 small" role="alert"></div>
          <form id="registerForm">
            <div class="mb-3"><input type="text" id="registerUsername" class="form-control" placeholder="设置用户名" required></div>
            <div class="mb-4"><input type="password" id="registerPassword" class="form-control" placeholder="设置密码 (至少6位)" required></div>
            <button type="submit" class="btn btn-apple mb-3">注册</button>
            <div class="text-center small"><span class="text-secondary">已有账号？</span><a href="javascript:void(0)" onclick="switchModal('login')" class="text-decoration-none fw-bold" style="color: var(--apple-blue);">返回登录</a></div>
          </form>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    const postDetail = document.getElementById('postDetail');
    const targetList = document.getElementById('targetList');
    const navButtons = document.getElementById('navButtons');
    const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
    const registerModal = new bootstrap.Modal(document.getElementById('registerModal'));
    
    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();
    const username = localStorage.getItem('username') || '';

    const getPostId = () => new URLSearchParams(window.location.search).get('id');
    const setMsg = (el, text, type) => { if(el) { el.className = 'alert d-block alert-' + type + ' py-2 small'; el.textContent = text; } };

    window.switchModal = (to) => {
        if (to === 'register') { loginModal.hide(); setTimeout(() => registerModal.show(), 400); }
        else { registerModal.hide(); setTimeout(() => loginModal.show(), 400); }
    };
    window.showLoginPrompt = (msg) => { loginModal.show(); if (msg) setMsg(document.getElementById('loginModalMsg'), msg, 'warning'); };
    window.showRegisterPrompt = () => registerModal.show();
    window.handleLogout = () => { if (confirm('确定要退出登录吗？')) { localStorage.removeItem('token'); localStorage.removeItem('tokenType'); localStorage.removeItem('username'); location.reload(); } };

    const renderNavButtons = () => {
      if (token) {
        navButtons.innerHTML = `<div class="user-info"><div class="user-avatar">${username ? username.charAt(0).toUpperCase() : 'U'}</div><span class="fw-medium">${username}</span><button class="btn btn-link btn-sm text-danger text-decoration-none p-0" onclick="handleLogout()">退出</button></div>`;
      } else {
        navButtons.innerHTML = `<button class="btn btn-outline-dark btn-pill px-4" onclick="showLoginPrompt()">登录</button><button class="btn btn-dark btn-pill px-4 ms-2" onclick="showRegisterPrompt()">注册</button>`;
      }
    };

    // Shared Auth Logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('loginUsername').value.trim();
        const p = document.getElementById('loginPassword').value;
        const res = await fetch('/user/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
        const result = await res.json();
        if (res.ok && result.code === 200) { localStorage.setItem('token', result.data.token); localStorage.setItem('tokenType', result.data.tokenType || 'Bearer'); localStorage.setItem('username', result.data.username || u); location.reload(); }
        else setMsg(document.getElementById('loginModalMsg'), result.message || '登录失败', 'danger');
    });
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('registerUsername').value.trim();
        const p = document.getElementById('registerPassword').value;
        if (p.length < 6) return setMsg(document.getElementById('registerModalMsg'), '密码至少需要6位', 'danger');
        const res = await fetch('/user/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
        const result = await res.json();
        if (res.ok && result.code === 200) { setMsg(document.getElementById('registerModalMsg'), '注册成功', 'success'); setTimeout(() => switchModal('login'), 1000); }
        else setMsg(document.getElementById('registerModalMsg'), result.message || '注册失败', 'danger');
    });

    const loadPostDetail = async () => {
      const postId = getPostId();
      if (!postId) return;
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;
      try {
        const res = await fetch(`/post/${postId}`, { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          const post = result.data;
          document.getElementById('postTitle').textContent = post.title;
          if (post.tag) document.getElementById('postTag').innerHTML = `<span class="badge badge-apple">#${post.tag}</span>`;
          document.getElementById('postMeta').textContent = `作者：${post.username || '未知'} · ${post.createdAt || ''}`;
          if (post.imageUrl) { document.getElementById('postImageSrc').src = post.imageUrl; document.getElementById('postImage').classList.remove('d-none'); }
          document.getElementById('postContent').textContent = post.content;
          postDetail.classList.remove('d-none');
        }
      } catch (e) { console.error(e); }
    };

    const loadReviewTargets = async () => {
      const postId = getPostId();
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;
      try {
        const res = await fetch(`/post/${postId}/review-targets`, { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          const targets = result.data || [];
          if (!targets.length) { targetList.innerHTML = '<div class="text-center text-muted py-4">暂无评论对象</div>'; return; }
          targetList.innerHTML = targets.map(t => `
            <div class="target-card" onclick="location.href='/review-target-detail?id=${t.id}'">
              <div class="d-flex justify-content-between align-items-center">
                <div class="target-name">${t.targetName}</div>
                ${t.avgScore ? `<div class="score-badge">★ ${t.avgScore.toFixed(1)}</div>` : '<div class="text-muted small">暂无评分</div>'}
              </div>
              <div class="text-secondary small mt-1">${t.commentCount} 条评论</div>
            </div>
          `).join('');
        }
      } catch (e) { console.error(e); }
    };

    window.showAddTarget = () => {
        if (!token) return showLoginPrompt('请先登录后再添加评论对象');
        document.getElementById('addTargetForm').classList.remove('d-none');
    };
    window.hideAddTarget = () => document.getElementById('addTargetForm').classList.add('d-none');

    document.getElementById('targetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('targetNameInput').value.trim();
        const postId = getPostId();
        const res = await fetch(`/post/${postId}/review-target`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `${tokenType} ${token}` }, body: JSON.stringify({ targetName: name }) });
        const result = await res.json();
        if (result.code === 200) { hideAddTarget(); loadReviewTargets(); }
    });

    renderNavButtons();
    loadPostDetail();
    loadReviewTargets();
  })();
</script>
</body>
</html>
