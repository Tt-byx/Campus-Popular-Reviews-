<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>对象详情 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
        --apple-bg: #f5f5f7;
        --apple-card: #ffffff;
        --apple-text: #1d1d1f;
        --apple-secondary: #86868b;
        --apple-blue: #0066cc;
        --apple-radius: 18px;
        --apple-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    body { background: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    
    .detail-card { border: none; border-radius: 24px; background: var(--apple-card); box-shadow: var(--apple-shadow); padding: 30px; margin-bottom: 24px; }
    .target-name { font-weight: 700; font-size: 2rem; letter-spacing: -0.02em; }
    .score-large { font-size: 2.5rem; font-weight: 700; color: #ff9500; }
    
    .comment-card { border: none; border-radius: 20px; background: var(--apple-card); box-shadow: var(--apple-shadow); padding: 20px; margin-bottom: 16px; transition: transform 0.2s; }
    .comment-card:hover { transform: translateY(-2px); }
    .comment-user { font-weight: 600; font-size: 0.95rem; }
    .comment-content { color: #333; line-height: 1.5; margin-top: 8px; }
    
    .star-rating { display: flex; gap: 4px; font-size: 1.5rem; cursor: pointer; color: #d2d2d7; }
    .star.active { color: #ff9500; }
    
    /* Apple Style Modal */
    .modal-content { border: none; border-radius: 28px; box-shadow: 0 30px 60px rgba(0,0,0,0.12); background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    .modal-header { border: none; padding: 40px 40px 10px; flex-direction: column; align-items: center; }
    .modal-body { padding: 20px 40px 40px; }
    .form-control { background: rgba(0, 0, 0, 0.05); border: none; border-radius: 12px; padding: 14px 16px; }
    .btn-apple { background: var(--apple-blue); color: white; border: none; border-radius: 12px; padding: 14px; font-weight: 600; width: 100%; }
    .btn-pill { border-radius: 20px; padding: 6px 16px; font-weight: 500; }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-avatar { width: 32px; height: 32px; background: #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; color: #555; }
    .score-badge { background: #ff9500; color: white; border-radius: 6px; padding: 1px 6px; font-size: 0.75rem; font-weight: 600; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="d-flex justify-content-between align-items-center mb-5">
    <div>
        <h1 class="h3 m-0 fw-bold">对象详情</h1>
        <a id="backToPost" href="javascript:history.back()" class="text-decoration-none small" style="color: var(--apple-blue);">← 返回帖子</a>
    </div>
    <div class="d-flex gap-3 align-items-center" id="navButtons"></div>
  </div>

  <div id="msg" class="alert d-none" role="alert"></div>

  <div class="detail-card">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <div class="target-name" id="targetName">加载中...</div>
            <div class="text-secondary" id="postInfo"></div>
        </div>
        <div class="text-end">
            <div class="score-large" id="avgScore">--</div>
            <div class="text-secondary small">平均得分</div>
        </div>
    </div>
  </div>

  <div class="mb-4">
    <h4 class="fw-bold">发表评论</h4>
    <div class="detail-card p-4">
        <form id="commentForm">
            <div class="mb-3">
                <label class="form-label small text-secondary fw-bold">你的评分</label>
                <div class="star-rating" id="starRating">
                    <span class="star" data-score="1">★</span>
                    <span class="star" data-score="2">★</span>
                    <span class="star" data-score="3">★</span>
                    <span class="star" data-score="4">★</span>
                    <span class="star" data-score="5">★</span>
                </div>
            </div>
            <label for="commentContent" class="visually-hidden">评价内容</label>
                <textarea id="commentContent" class="form-control mb-3" rows="3" placeholder="写下你的真实评价..." required></textarea>
            <div class="text-end">
                <button type="submit" class="btn btn-primary btn-pill px-4">发表评论</button>
            </div>
        </form>
    </div>
  </div>

  <h4 class="fw-bold mb-3">所有评论 (<span id="commentCount">0</span>)</h4>
  <div id="commentList"></div>
</div>

<!-- Modals -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="fw-bold m-0">登录</h3>
          <p class="text-secondary mt-2">欢迎回到校圈</p>
        </div>
        <div class="modal-body">
          <div id="loginModalMsg" class="alert d-none mb-3 py-2 small" role="alert"></div>
          <form id="loginForm">
            <div class="mb-3"><label for="loginUsername" class="visually-hidden">用户名</label><input type="text" id="loginUsername" class="form-control" placeholder="用户名" required></div>
            <div class="mb-4"><label for="loginPassword" class="visually-hidden">密码</label><input type="password" id="loginPassword" class="form-control" placeholder="密码" required></div>
            <button type="submit" class="btn btn-apple mb-3">登录</button>
            <div class="text-center small"><span class="text-secondary">还没有账号？</span><a href="javascript:void(0)" onclick="switchModal('register')" class="text-decoration-none fw-bold" style="color: var(--apple-blue);">立即注册</a></div>
          </form>
        </div>
      </div>
    </div>
  </div>
  
  <div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
      <div class="modal-content">
        <div class="modal-header">
          <h3 class="fw-bold m-0">注册</h3>
          <p class="text-secondary mt-2">加入校圈社区</p>
        </div>
        <div class="modal-body">
          <div id="registerModalMsg" class="alert d-none mb-3 py-2 small" role="alert"></div>
          <form id="registerForm">
            <div class="mb-3"><label for="registerUsername" class="visually-hidden">设置用户名</label><input type="text" id="registerUsername" class="form-control" placeholder="设置用户名" required></div>
            <div class="mb-4"><label for="registerPassword" class="visually-hidden">设置密码</label><input type="password" id="registerPassword" class="form-control" placeholder="设置密码 (至少6位)" required></div>
            <button type="submit" class="btn btn-apple mb-3">注册</button>
            <div class="text-center small"><span class="text-secondary">已有账号？</span><a href="javascript:void(0)" onclick="switchModal('login')" class="text-decoration-none fw-bold" style="color: var(--apple-blue);">返回登录</a></div>
          </form>
        </div>
      </div>
    </div>
  </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    const navButtons = document.getElementById('navButtons');
    const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
    const registerModal = new bootstrap.Modal(document.getElementById('registerModal'));
    
    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();
    const username = localStorage.getItem('username') || '';
    let selectedScore = 0;

    const getTargetId = () => new URLSearchParams(window.location.search).get('id');
    const setMsg = (el, text, type) => { if(el) { el.className = 'alert d-block alert-' + type + ' py-2 small'; el.textContent = text; } };

    window.switchModal = (to) => {
        if (to === 'register') { loginModal.hide(); setTimeout(() => registerModal.show(), 400); }
        else { registerModal.hide(); setTimeout(() => loginModal.show(), 400); }
    };
    window.showLoginPrompt = (msg) => { loginModal.show(); if (msg) setMsg(document.getElementById('loginModalMsg'), msg, 'warning'); };
    window.showRegisterPrompt = () => registerModal.show();
    window.handleLogout = () => { if (confirm('确定要退出登录吗？')) { localStorage.removeItem('token'); localStorage.removeItem('tokenType'); localStorage.removeItem('username'); location.reload(); } };

    const renderNavButtons = () => {
      if (token) {
        navButtons.innerHTML = `
          <a class="btn btn-outline-primary btn-sm rounded-pill px-3" id="backToPostBtn" href="#">返回帖子</a>
          <div class="user-info" style="cursor: pointer;" onclick="location.href='/profile'">
            <div class="user-avatar" id="navAvatar">${username ? username.charAt(0).toUpperCase() : 'U'}</div>
            <span class="fw-medium">${username}</span>
            <button class="btn btn-link btn-sm text-danger text-decoration-none p-0" onclick="event.stopPropagation(); handleLogout()">退出</button>
          </div>
        `;
        fetch('/user/profile', { headers: { 'Authorization': `${tokenType} ${token}` } })
          .then(res => res.json())
          .then(res => {
            if (res.code === 200 && res.data.avatar) {
              document.getElementById('navAvatar').innerHTML = `<img src="${res.data.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            }
          });
      } else {
        navButtons.innerHTML = `<button class="btn btn-outline-dark btn-pill px-4" onclick="showLoginPrompt()">登录</button><button class="btn btn-dark btn-pill px-4 ms-2" onclick="showRegisterPrompt()">注册</button>`;
      }
    };

    // Auth logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('loginUsername').value.trim();
        const p = document.getElementById('loginPassword').value;
        const res = await fetch('/user/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
        const result = await res.json();
        if (res.ok && result.code === 200) { localStorage.setItem('token', result.data.token); localStorage.setItem('tokenType', result.data.tokenType || 'Bearer'); localStorage.setItem('username', result.data.username || u); location.reload(); }
        else setMsg(document.getElementById('loginModalMsg'), result.message || '登录失败', 'danger');
    });
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const u = document.getElementById('registerUsername').value.trim();
        const p = document.getElementById('registerPassword').value;
        if (p.length < 6) return setMsg(document.getElementById('registerModalMsg'), '密码至少需要6位', 'danger');
        const res = await fetch('/user/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
        const result = await res.json();
        if (res.ok && result.code === 200) { setMsg(document.getElementById('registerModalMsg'), '注册成功', 'success'); setTimeout(() => switchModal('login'), 1000); }
        else setMsg(document.getElementById('registerModalMsg'), result.message || '注册失败', 'danger');
    });

    const loadTargetDetail = async () => {
      const targetId = getTargetId();
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;
      try {
        const res = await fetch(`/post/review-target/${targetId}`, { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          const data = result.data;
          document.getElementById('targetName').textContent = data.targetName;
          document.getElementById('postInfo').textContent = `所属帖子：${data.postTitle}`;
          document.getElementById('backToPost').href = `/post-detail?id=${data.postId}`;
          
          const comments = data.comments || [];
          document.getElementById('commentCount').textContent = comments.length;
          
          const scores = comments.filter(c => c.score).map(c => c.score);
          if (scores.length) {
              const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
              document.getElementById('avgScore').textContent = avg.toFixed(1);
          }

          document.getElementById('commentList').innerHTML = comments.map(c => `
            <div class="comment-card">
                <div class="d-flex justify-content-between align-items-center">
                    <span class="comment-user">${c.username || '匿名'}</span>
                    <div class="d-flex gap-2 align-items-center">
                        ${c.score ? `<span class="score-badge">★ ${c.score}</span>` : ''}
                        <span class="text-secondary small">${c.createdAt || ''}</span>
                    </div>
                </div>
                <div class="comment-content">${c.content}</div>
            </div>
          `).join('');
        }
      } catch (e) { console.error(e); }
    };

    // Star rating
    document.getElementById('starRating').addEventListener('click', (e) => {
        if (!token) return showLoginPrompt('请先登录后再评分');
        if (e.target.classList.contains('star')) {
            selectedScore = parseInt(e.target.dataset.score);
            document.querySelectorAll('.star').forEach((s, i) => {
                s.classList.toggle('active', i < selectedScore);
            });
        }
    });

    document.getElementById('commentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!token) return showLoginPrompt('请先登录后再发表评论');
        const content = document.getElementById('commentContent').value.trim();
        const targetId = getTargetId();
        const res = await fetch(`/post/review-target/${targetId}/comment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `${tokenType} ${token}` },
            body: JSON.stringify({ content, score: selectedScore || null })
        });
        const result = await res.json();
        if (result.code === 200) { location.reload(); }
    });

    renderNavButtons();
    loadTargetDetail();
  })();
</script>
</body>
</html>
