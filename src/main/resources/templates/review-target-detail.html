<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>对象详情 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/app.css}" rel="stylesheet" />
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font); }
    .target-name { font-weight: 700; font-size: 1.75rem; letter-spacing: -0.02em; color: var(--slate); }
    .score-large { font-size: 2.5rem; font-weight: 700; background: linear-gradient(135deg, var(--sapphire), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .comment-card { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--card); box-shadow: var(--shadow-xs); padding: 20px; margin-bottom: 14px; transition: transform 0.2s, box-shadow 0.2s; }
    .comment-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); border-color: var(--gray-300); }
    .comment-user { font-weight: 600; font-size: 0.95rem; color: var(--slate); }
    .comment-content { color: var(--text); line-height: 1.6; margin-top: 8px; }
    .star-rating { display: flex; gap: 8px; cursor: pointer; align-items: center; justify-content: center; }
    .star-wrap { text-align: center; }
    .star-svg { width: 36px; height: 36px; cursor: pointer; transition: transform 0.15s; color: #D1D5DB; }
    .star-svg.active { color: #F59E0B; transform: scale(1.1); }
    .star-svg:hover { transform: scale(1.15); }
    .star-label { font-size: 0.7rem; color: var(--text-secondary); text-align: center; min-width: 48px; margin-top: 2px; font-weight: 500; }
    .score-dist-card { border: 1px solid var(--border); border-radius: var(--radius-lg); background: var(--card); box-shadow: var(--shadow-xs); padding: 24px; margin-bottom: 24px; }
    .score-dist-title { font-weight: 700; font-size: 1rem; margin-bottom: 18px; color: var(--slate); }
    .bar-chart { display: flex; flex-direction: column; gap: 10px; }
    .bar-row { display: flex; align-items: center; gap: 12px; }
    .bar-label { min-width: 48px; font-size: 0.82rem; font-weight: 600; text-align: right; color: var(--text); }
    .bar-track { flex: 1; height: 28px; background: var(--gray-100); border-radius: 8px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 8px; transition: width 0.6s cubic-bezier(0.22,1,0.36,1); display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-size: 0.75rem; font-weight: 700; color: white; min-width: 28px; }
    .bar-count { min-width: 36px; font-size: 0.82rem; font-weight: 600; color: var(--text-secondary); text-align: right; }
    .bar-fill.level-1 { background: linear-gradient(135deg, #EF4444, #F87171); }
    .bar-fill.level-2 { background: linear-gradient(135deg, #F59E0B, #FBBF24); }
    .bar-fill.level-3 { background: linear-gradient(135deg, #10B981, #34D399); }
    .bar-fill.level-4 { background: linear-gradient(135deg, var(--sapphire-light), var(--sapphire)); }
    .bar-fill.level-5 { background: linear-gradient(135deg, var(--sapphire), var(--teal)); }
    .score-badge { background: linear-gradient(135deg, var(--sapphire), var(--teal)); color: white; border-radius: 6px; padding: 2px 10px; font-size: 0.78rem; font-weight: 700; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; text-decoration: none; padding: 6px 14px; border-radius: var(--radius-full); transition: all 0.2s; }
    .back-link:hover { color: var(--sapphire); background: rgba(37, 99, 235, 0.06); text-decoration: none; }
  </style>
</head>
<body>
<div class="bento-container">
  <aside class="bento-sidebar" id="mainSidebar">
    <div class="bento-card sidebar-profile-card">
      <div class="sidebar-avatar" id="sidebarAvatar">U</div>
      <div class="sidebar-username" id="sidebarUsername">用户</div>
      <div class="sidebar-bio" id="sidebarBio">分享校园生活</div>
    </div>
    <div class="bento-card sidebar-nav">
      <button class="sidebar-nav-item" onclick="location.href='/browse-post'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/categories'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>分类
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/ranking'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>排行
      </button>
      <button class="sidebar-nav-item" id="adminNavBtn" style="display:none" onclick="location.href='/admin'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>管理
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/profile'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>个人中心
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/settings'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置
      </button>
      <button class="sidebar-nav-item" id="sidebarLogoutBtn" style="display:none;color:var(--red)" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录
      </button>
    </div>
    <div class="bento-card bento-card-sm" id="sidebarLoginArea" style="display:none">
      <div class="bento-card-body text-center">
        <p class="text-secondary text-sm m-0">登录以解锁全部功能</p>
        <div class="flex gap-2 justify-center mt-3">
          <button class="btn btn-primary btn-sm" onclick="showLoginPrompt()">登录</button>
          <button class="btn btn-secondary btn-sm" onclick="showRegisterPrompt()">注册</button>
        </div>
      </div>
    </div>
  </aside>

  <script>
    (function(){
      var u = localStorage.getItem('username');
      if (u) {
        document.getElementById('sidebarUsername').textContent = u;
        document.getElementById('sidebarAvatar').textContent = u.charAt(0).toUpperCase();
        document.getElementById('sidebarBio').textContent = '';
        document.getElementById('sidebarLoginArea').style.display = 'none';
        document.getElementById('sidebarLogoutBtn').style.display = 'flex';
        var r = localStorage.getItem('role') || 'user';
        if (r === 'admin' || r === 'super_admin') {
          var ab = document.getElementById('adminNavBtn');
          if (ab) ab.style.display = 'flex';
        }
      } else {
        document.getElementById('sidebarLoginArea').style.display = 'block';
        document.getElementById('sidebarLogoutBtn').style.display = 'none';
      }
    })();
  </script>

  <main class="bento-main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <a href="javascript:void(0)" onclick="handleBackToPost()" class="back-link" id="backToPost">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg> 返回帖子
      </a>
    </div>

    <div id="msg" class="alert d-none" role="alert"></div>

    <div class="bento-card p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <div class="target-name" id="targetName">加载中...</div>
          <div class="text-secondary text-sm mt-1" id="postInfo"></div>
        </div>
        <div class="text-end">
          <div class="d-flex align-items-center gap-3 mb-2">
            <div class="text-center">
              <div class="fs-4 fw-bold" style="color:var(--sapphire)" id="commentCountTop">0</div>
              <div class="text-secondary small">评论</div>
            </div>
            <div class="vr"></div>
            <div>
              <div class="score-large" id="avgScore">--</div>
              <div class="text-secondary small">平均得分</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="score-dist-card" id="scoreDistCard">
      <div class="score-dist-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-3px;margin-right:6px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        评分分布
      </div>
      <div id="barChart" class="bar-chart"></div>
    </div>

    <div class="mb-4">
      <h4 class="fw-bold mb-3">发表评论</h4>
      <div class="bento-card p-4">
        <form id="commentForm">
          <div class="mb-3">
            <label class="form-label small text-secondary fw-bold">你的评分</label>
            <div class="star-rating" id="starRating">
              <div class="star-wrap"><svg class="star-svg" data-score="1" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div class="star-label">拉完了</div></div>
              <div class="star-wrap"><svg class="star-svg" data-score="2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div class="star-label">NPC</div></div>
              <div class="star-wrap"><svg class="star-svg" data-score="3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div class="star-label">人上人</div></div>
              <div class="star-wrap"><svg class="star-svg" data-score="4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div class="star-label">顶级</div></div>
              <div class="star-wrap"><svg class="star-svg" data-score="5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><div class="star-label">夯</div></div>
            </div>
          </div>
          <div class="mb-3">
            <textarea id="commentContent" class="f-input" rows="3" placeholder="写下你的真实评价..." required></textarea>
          </div>
          <div class="text-end">
            <button type="submit" class="btn btn-primary px-4">发表评论</button>
          </div>
        </form>
      </div>
    </div>

    <h4 class="fw-bold mb-3">所有评论 (<span id="commentCount">0</span>)</h4>
    <div id="commentList"></div>
  </main>
</div>

<div class="modal fade auth-modal" id="loginModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">登录</h5>
        <p class="modal-subtitle">欢迎回到校圈</p>
      </div>
      <div class="modal-body">
        <div id="loginModalMsg" class="alert d-none mb-3" role="alert"></div>
        <form id="loginForm">
          <div class="mb-3"><input type="text" id="loginUsername" class="form-control" placeholder="用户名" required></div>
          <div class="mb-4"><input type="password" id="loginPassword" class="form-control" placeholder="密码" required></div>
          <button type="submit" class="btn-submit mb-3">登录</button>
          <div class="text-center" style="font-size:0.88rem"><span class="text-secondary">还没有账号？</span><a href="javascript:void(0)" onclick="switchModal('register')" class="switch-link">立即注册</a></div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="modal fade auth-modal" id="registerModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static" data-bs-keyboard="false">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="btn-close-custom" data-bs-dismiss="modal" aria-label="关闭">&times;</button>
        <h5 class="modal-title">注册</h5>
        <p class="modal-subtitle">加入校圈社区</p>
      </div>
      <div class="modal-body">
        <div id="registerModalMsg" class="alert d-none mb-3" role="alert"></div>
        <form id="registerForm">
          <div class="mb-3"><input type="text" id="registerUsername" class="form-control" placeholder="设置用户名" required></div>
          <div class="mb-4"><input type="password" id="registerPassword" class="form-control" placeholder="设置密码 (至少6位)" required></div>
          <button type="submit" class="btn-submit mb-3">注册</button>
          <div class="text-center" style="font-size:0.88rem"><span class="text-secondary">已有账号？</span><a href="javascript:void(0)" onclick="switchModal('login')" class="switch-link">返回登录</a></div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (() => {
    document.querySelectorAll('.sidebar-nav-item').forEach(item => {
      const orig = item.getAttribute('onclick');
      if (!orig || !orig.includes('location.href')) return;
      item.removeAttribute('onclick');
      item.addEventListener('click', function(e) {
        e.preventDefault();
        let url = '';
        const match = orig.match(/location\.href\s*=\s*['"]([^'"]+)['"]/);
        if (match) {
          url = match[1];
        } else {
          const funcMatch = orig.match(/location\.href\s*=\s*(\S+)/);
          if (funcMatch) {
            url = funcMatch[1].replace(/[();\s]+$/, '');
          }
        }
        if (!url) return;
        document.body.classList.add('page-transitioning');
        setTimeout(() => { 
          window.location.href = url;
        }, 120);
      });
    });

    const navButtons = document.getElementById('navButtons');
    const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
    const registerModal = new bootstrap.Modal(document.getElementById('registerModal'));

    const token = (localStorage.getItem('token') || '').trim();
    const tokenType = (localStorage.getItem('tokenType') || 'Bearer').trim();
    const username = localStorage.getItem('username') || '';
    let selectedScore = 0;

    const getTargetId = () => new URLSearchParams(window.location.search).get('id');
    const getSource = () => new URLSearchParams(window.location.search).get('from') || '';
    const setMsg = (el, text, type) => { if(el) { el.className = 'alert d-block alert-' + type + ' py-2 small'; el.textContent = text; } };

    const SCORE_LABELS = { 1: '拉完了', 2: 'NPC', 3: '人上人', 4: '顶级', 5: '夯' };
    const getScoreLabel = (s) => SCORE_LABELS[s] || s;

    window.switchModal = (to) => {
      if (to === 'register') { loginModal.hide(); setTimeout(() => registerModal.show(), 400); }
      else { registerModal.hide(); setTimeout(() => loginModal.show(), 400); }
    };
    window.showLoginPrompt = (msg) => { loginModal.show(); if (msg) setMsg(document.getElementById('loginModalMsg'), msg, 'warning'); };
    window.showRegisterPrompt = () => registerModal.show();
    window.handleLogout = () => { if (confirm('确定要退出登录吗？')) { localStorage.removeItem('token'); localStorage.removeItem('tokenType'); localStorage.removeItem('username'); localStorage.removeItem('role'); location.reload(); } };

    const initSidebar = async () => {
      const sidebarLoginArea = document.getElementById('sidebarLoginArea');
      const sidebarLogoutBtn = document.getElementById('sidebarLogoutBtn');
      const adminNavBtn = document.getElementById('adminNavBtn');
      const sidebarAvatar = document.getElementById('sidebarAvatar');
      const sidebarUsername = document.getElementById('sidebarUsername');
      const sidebarBio = document.getElementById('sidebarBio');

      if (!token) {
        sidebarLoginArea.style.display = 'block';
        sidebarLogoutBtn.style.display = 'none';
        document.querySelector('.sidebar-profile-card .sidebar-username').textContent = '游客';
        document.querySelector('.sidebar-profile-card .sidebar-bio').textContent = '登录以解锁全部功能';
        return;
      }

      sidebarLoginArea.style.display = 'none';
      sidebarLogoutBtn.style.display = 'flex';

      const role = localStorage.getItem('role') || 'user';
      if (role === 'admin' || role === 'super_admin') {
        adminNavBtn.style.display = 'flex';
      }

      sidebarUsername.textContent = username;
      try {
        const res = await fetch('/user/profile', {
          headers: { 'Authorization': `${tokenType} ${token}` }
        });
        const result = await res.json();
        if (result.code === 200 && result.data) {
          const data = result.data;
          if (data.avatar) {
            sidebarAvatar.innerHTML = `<img src="${data.avatar}" alt="">`;
          } else {
            sidebarAvatar.textContent = (data.username || username).charAt(0).toUpperCase();
          }
          sidebarUsername.textContent = data.username || username;
          sidebarBio.textContent = data.signature || '';
        }
      } catch(e) {
        sidebarAvatar.textContent = username.charAt(0).toUpperCase();
      }
    };

    const initNav = () => {
      const role = localStorage.getItem('role') || 'user';
      if (role === 'admin' || role === 'super_admin') {
        const adminBtn = document.getElementById('adminNavBtn');
        if (adminBtn) adminBtn.style.display = 'flex';
      }
    };

    const renderNavButtons = () => {
      const role = localStorage.getItem('role') || 'user';
      if (token) {
        navButtons.innerHTML = `
          <div class="user-info" style="cursor:pointer;display:flex;align-items:center;gap:10px" onclick="location.href='/profile'">
            <div class="user-avatar" id="navAvatar" style="width:32px;height:32px;background:linear-gradient(135deg,var(--sapphire),var(--teal));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:white;overflow:hidden">${username ? username.charAt(0).toUpperCase() : 'U'}</div>
            <span class="fw-medium" style="font-size:0.92rem">${username}</span>
            ${(role === 'admin' || role === 'super_admin') ? ` <a href="/admin" class="text-decoration-none" style="color:var(--sapphire);font-size:0.82rem">管理</a>` : ''}
            <button class="btn btn-link btn-sm text-danger text-decoration-none p-0" onclick="event.stopPropagation(); handleLogout()">退出</button>
          </div>
        `;
        fetch('/user/profile', { headers: { 'Authorization': `${tokenType} ${token}` } })
          .then(res => res.json())
          .then(res => {
            if (res.code === 200 && res.data.avatar) {
              document.getElementById('navAvatar').innerHTML = `<img src="${res.data.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            }
          });
      } else {
        navButtons.innerHTML = `<button class="btn btn-outline-dark btn-pill px-4" onclick="showLoginPrompt()">登录</button><button class="btn btn-dark btn-pill px-4 ms-2" onclick="showRegisterPrompt()">注册</button>`;
      }
    };

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('loginUsername').value.trim();
      const p = document.getElementById('loginPassword').value;
      const res = await fetch('/user/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
      const result = await res.json();
      if (res.ok && result.code === 200) { localStorage.setItem('token', result.data.token); localStorage.setItem('tokenType', result.data.tokenType || 'Bearer'); localStorage.setItem('username', result.data.username || u); localStorage.setItem('role', result.data.role || 'user'); location.reload(); }
      else setMsg(document.getElementById('loginModalMsg'), result.message || '登录失败', 'danger');
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const u = document.getElementById('registerUsername').value.trim();
      const p = document.getElementById('registerPassword').value;
      if (p.length < 6) return setMsg(document.getElementById('registerModalMsg'), '密码至少需要6位', 'danger');
      const res = await fetch('/user/create', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
      const result = await res.json();
      if (res.ok && result.code === 200) {
        localStorage.setItem('token', result.data.token);
        localStorage.setItem('tokenType', result.data.tokenType || 'Bearer');
        localStorage.setItem('username', result.data.username || u);
        localStorage.setItem('role', result.data.role || 'user');
        setMsg(document.getElementById('registerModalMsg'), '注册成功', 'success');
        setTimeout(() => location.reload(), 800);
      }
      else setMsg(document.getElementById('registerModalMsg'), result.message || '注册失败', 'danger');
    });

    const loadTargetDetail = async () => {
      const targetId = getTargetId();
      const source = getSource();
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;
      try {
        const res = await fetch(`/post/review-target/${targetId}`, { method: 'GET', headers });
        const result = await res.json();
        if (result.code === 200) {
          const data = result.data;
          document.getElementById('targetName').textContent = data.targetName;
          document.getElementById('postInfo').textContent = `所属帖子：${data.postTitle}`;

          const backToPostBtn = document.getElementById('backToPost');
          backToPostBtn.dataset.postId = data.postId;
          backToPostBtn.dataset.source = source;

          const comments = data.comments || [];
          const commentCount = comments.length;
          document.getElementById('commentCount').textContent = commentCount;
          document.getElementById('commentCountTop').textContent = commentCount;

          const scores = comments.filter(c => c.score).map(c => c.score);
          if (scores.length) {
            const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
            document.getElementById('avgScore').textContent = avg.toFixed(1);
          }

          document.getElementById('commentList').innerHTML = comments.map(c => `
            <div class="comment-card">
              <div class="d-flex justify-content-between align-items-center">
                <span class="comment-user">${c.username || '匿名'}</span>
                <div class="d-flex gap-2 align-items-center">
                  ${c.score ? `<span class="score-badge">${getScoreLabel(c.score)}</span>` : ''}
                  <span class="text-secondary small">${c.createdAt || ''}</span>
                </div>
              </div>
              <div class="comment-content">${c.content}</div>
            </div>
          `).join('');
        }
      } catch (e) { console.error(e); }
    };

    window.handleBackToPost = () => {
      const backToPostBtn = document.getElementById('backToPost');
      const postId = backToPostBtn.dataset.postId;
      const source = backToPostBtn.dataset.source;
      if (!postId) { location.href = '/browse-post'; return; }
      let url = `/post-detail?id=${postId}`;
      if (source === 'search') url += '&from=search';
      else if (source === 'admin') url += '&from=admin';
      else if (source === 'categories') url += '&from=categories';
      else if (source === 'ranking') url += '&from=ranking';
      else if (source === 'profile') url += '&from=profile';
      location.href = url;
    };

    const starRatingEl = document.getElementById('starRating');
    starRatingEl.addEventListener('click', (e) => {
      if (!token) return showLoginPrompt('请先登录后再评分');
      const svg = e.target.closest('.star-svg');
      if (svg) {
        selectedScore = parseInt(svg.dataset.score);
        starRatingEl.querySelectorAll('.star-svg').forEach((s, i) => {
          s.classList.toggle('active', i < selectedScore);
          s.setAttribute('fill', i < selectedScore ? '#F59E0B' : 'none');
        });
      }
    });

    starRatingEl.querySelectorAll('.star-svg').forEach((s, i) => {
      s.addEventListener('mouseenter', () => {
        starRatingEl.querySelectorAll('.star-svg').forEach((ss, j) => {
          if (j <= i && !ss.classList.contains('active')) {
            ss.setAttribute('fill', '#FDE68A');
          }
        });
      });
      s.addEventListener('mouseleave', () => {
        starRatingEl.querySelectorAll('.star-svg').forEach((ss) => {
          if (!ss.classList.contains('active')) {
            ss.setAttribute('fill', 'none');
          }
        });
      });
    });

    document.getElementById('commentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!token) return showLoginPrompt('请先登录后再发表评论');
      const content = document.getElementById('commentContent').value.trim();
      const targetId = getTargetId();
      const res = await fetch(`/post/review-target/${targetId}/comment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `${tokenType} ${token}` },
        body: JSON.stringify({ content, score: selectedScore || null })
      });
      const result = await res.json();
      if (result.code === 200) { location.reload(); }
      else { alert(result.message || '操作失败'); }
    });

    const loadScoreDist = async () => {
      const targetId = getTargetId();
      const headers = {};
      if (token) headers['Authorization'] = `${tokenType} ${token}`;
      try {
        const res = await fetch(`/post/review-target/${targetId}/stats`, { method: 'GET', headers });
        const result = await res.json();
        if (result.code !== 200 || !result.data) return;
        const data = result.data;
        const dist = data.distribution || {};
        const total = data.totalRatings || 0;
        const barChartEl = document.getElementById('barChart');
        const labels = ['夯', '顶级', '人上人', 'NPC', '拉完了'];
        const levelMap = { '夯': 5, '顶级': 4, '人上人': 3, 'NPC': 2, '拉完了': 1 };
        const maxCount = Math.max(...Object.values(dist), 1);
        barChartEl.innerHTML = labels.map((label) => {
          const count = dist[label] || 0;
          const pct = total > 0 ? (count / total * 100) : 0;
          const level = levelMap[label];
          return `<div class="bar-row">
            <div class="bar-label">${label}</div>
            <div class="bar-track"><div class="bar-fill level-${level}" style="width:${Math.max(pct, count > 0 ? 4 : 0)}%">${count > 0 ? count : ''}</div></div>
            <div class="bar-count">${count}</div>
          </div>`;
        }).join('');
      } catch (e) { console.error(e); }
    };

    initSidebar();
    initNav();
    loadTargetDetail();
    loadScoreDist();
  })();
</script>
</body>
</html>
