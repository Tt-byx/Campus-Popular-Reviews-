<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人中心 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    :root {
        --apple-bg: #f5f5f7;
        --apple-card: #ffffff;
        --apple-text: #1d1d1f;
        --apple-secondary: #86868b;
        --apple-blue: #0066cc;
        --apple-radius: 20px;
        --apple-shadow: 0 8px 30px rgba(0,0,0,0.04);
    }
    body { background: var(--apple-bg); color: var(--apple-text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .wrap { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    
    .profile-card { 
        border: none; 
        border-radius: 24px; 
        background: var(--apple-card);
        box-shadow: var(--apple-shadow);
        padding: 40px;
        margin-bottom: 30px;
        position: relative;
    }
    
    .avatar-wrapper {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        overflow: hidden;
        background: #eee;
        margin-bottom: 20px;
        position: relative;
    }
    .avatar-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-upload-label {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.5);
        color: white;
        font-size: 10px;
        text-align: center;
        padding: 4px 0;
        cursor: pointer;
        display: none;
    }
    
    .user-name { font-weight: 700; font-size: 1.75rem; letter-spacing: -0.02em; margin-bottom: 4px; }
    .user-signature { color: var(--apple-secondary); font-size: 1rem; }
    .field-label {
        display: inline-block;
        color: var(--apple-secondary);
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
    }
    .field-value { margin-bottom: 16px; }
    
    .edit-btn { 
        position: absolute;
        top: 40px;
        right: 40px;
        border-radius: 20px;
        padding: 6px 16px;
        font-weight: 500;
        font-size: 0.9rem;
    }

    /* Tabs Style */
    .apple-tabs {
        display: flex;
        gap: 30px;
        border-bottom: 1px solid #e5e5e5;
        margin-bottom: 24px;
        padding-bottom: 10px;
    }
    .tab-item {
        color: var(--apple-secondary);
        font-weight: 600;
        cursor: pointer;
        position: relative;
        padding-bottom: 10px;
    }
    .tab-item.active { color: var(--apple-text); }
    .tab-item.active::after {
        content: '';
        position: absolute;
        bottom: -11px;
        left: 0;
        right: 0;
        height: 2px;
        background: var(--apple-text);
    }
    
    .content-card {
        border: none; 
        border-radius: var(--apple-radius); 
        background: var(--apple-card);
        box-shadow: var(--apple-shadow);
        padding: 24px;
        margin-bottom: 16px;
        transition: transform 0.2s;
    }
    .content-card:hover { transform: translateY(-2px); }
    
    .form-control-apple {
        background: #f5f5f7;
        border: none;
        border-radius: 10px;
        padding: 10px 15px;
        margin-bottom: 10px;
    }
    .form-control-apple:focus { box-shadow: none; background: #eee; }
    
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        color: var(--apple-secondary);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
        padding: 6px 14px;
        border-radius: 20px;
        transition: all 0.2s ease;
    }
    .back-btn:hover {
        color: var(--apple-blue);
        background: rgba(0, 102, 204, 0.06);
        text-decoration: none;
    }
    .score-badge { background: #ff9500; color: white; border-radius: 8px; padding: 2px 10px; font-size: 0.85rem; font-weight: 600; }
    
    .avatar-wrapper { cursor: zoom-in; transition: opacity 0.2s; }
    .avatar-wrapper:hover { opacity: 0.85; }

    .lightbox {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.75);
        z-index: 9999;
        display: none;
        align-items: center;
        justify-content: center;
        cursor: zoom-out;
    }
    .lightbox.show { display: flex; }
    .lightbox img {
        max-width: 85vw;
        max-height: 85vh;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        object-fit: contain;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="mb-5">
    <a href="/browse-post" class="back-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg> 返回广场</a>
  </div>

  <div class="profile-card">
    <button id="editBtn" class="btn btn-outline-dark edit-btn">编辑资料</button>
    <div id="saveCancelGroup" class="d-none" style="position: absolute; top: 40px; right: 40px;">
        <button id="saveBtn" class="btn btn-primary btn-sm rounded-pill px-3 me-2">保存</button>
        <button id="cancelBtn" class="btn btn-light btn-sm rounded-pill px-3">取消</button>
    </div>

    <div class="avatar-wrapper">
        <img id="userAvatar" src="" alt="头像">
        <label for="avatarInput" class="avatar-upload-label" id="avatarLabel">更换头像</label>
        <input type="file" id="avatarInput" class="d-none" accept="image/*">
    </div>

    <div id="displayMode">
        <div class="field-value">
            <div class="field-label">昵称</div>
            <div class="user-name" id="userNameDisplay">加载中...</div>
        </div>
        <div class="field-value">
            <div class="field-label">个性签名</div>
            <div class="user-signature" id="userSignatureDisplay">这个人很懒，什么都没留下</div>
        </div>
    </div>

    <div id="editMode" class="d-none" style="max-width: 360px;">
        <div class="mb-3">
            <label for="userNameInput" class="form-label field-label mb-1">昵称</label>
            <input type="text" id="userNameInput" class="form-control form-control-apple" placeholder="输入你的昵称">
        </div>
        <div class="mb-3">
            <label for="userSignatureInput" class="form-label field-label mb-1">个性签名</label>
            <textarea id="userSignatureInput" class="form-control form-control-apple" placeholder="写点什么介绍自己..." rows="2"></textarea>
        </div>
    </div>
  </div>

  <div class="apple-tabs">
    <div class="tab-item active" data-tab="posts">我的帖子</div>
    <div class="tab-item" data-tab="comments">我的评论</div>
    <div class="tab-item" data-tab="targets">评论对象</div>
  </div>

  <div id="tabContent">
    <div id="postsList" class="d-grid gap-3"></div>
    <div id="commentsList" class="d-grid gap-3 d-none"></div>
    <div id="targetsList" class="d-grid gap-3 d-none"></div>
  </div>
</div>

<div class="lightbox" id="lightbox">
  <img src="" alt="头像大图" id="lightboxImg">
</div>

<script>
  (() => {
    const token = localStorage.getItem('token');
    const tokenType = localStorage.getItem('tokenType') || 'Bearer';
    const username = localStorage.getItem('username');

    if (!token) {
        localStorage.setItem('showLoginMsg', '请先登录后再访问个人中心');
        location.href = '/browse-post';
        return;
    }

    let currentUserData = null;

    const loadProfile = async () => {
        try {
            const res = await fetch('/user/profile', {
                headers: { 'Authorization': `${tokenType} ${token}` }
            });
            const result = await res.json();
            if (result.code === 200) {
                currentUserData = result.data;
                renderProfile();
            }
        } catch (e) { console.error(e); }
    };

    const renderProfile = () => {
        document.getElementById('userAvatar').src = currentUserData.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(currentUserData.username);
        document.getElementById('userNameDisplay').textContent = currentUserData.username;
        document.getElementById('userSignatureDisplay').textContent = currentUserData.signature || '这个人很懒，什么都没留下';
        
        document.getElementById('userNameInput').value = currentUserData.username;
        document.getElementById('userSignatureInput').value = currentUserData.signature || '';
    };

    const loadUserPosts = async () => {
        try {
            const res = await fetch('/post/user/posts', {
                headers: { 'Authorization': `${tokenType} ${token}` }
            });
            const result = await res.json();
            const list = document.getElementById('postsList');
            if (result.code === 200 && result.data.length) {
                list.innerHTML = result.data.map(p => `
                    <div class="content-card" onclick="location.href='/post-detail?id=${p.id}'" style="cursor:pointer">
                        ${p.imageUrl ? `<div class="mb-3"><img src="${p.imageUrl}" alt="${p.title}" style="width:100%;max-height:260px;object-fit:cover;border-radius:12px;display:block;"></div>` : ''}
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="fw-bold m-0">${p.title}</h5>
                            ${p.tag ? `<span class="badge bg-light text-secondary">#${p.tag}</span>` : ''}
                        </div>
                        <div class="text-secondary small mb-3">${p.createdAt}</div>
                        <div class="text-muted" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${p.content}</div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<div class="text-center text-muted py-5">暂无发布的帖子</div>';
            }
        } catch (e) { console.error(e); }
    };

    const loadUserComments = async () => {
        try {
            const res = await fetch('/post/user/comments', {
                headers: { 'Authorization': `${tokenType} ${token}` }
            });
            const result = await res.json();
            const list = document.getElementById('commentsList');
            if (result.code === 200 && result.data.length) {
                list.innerHTML = result.data.map(c => `
                    <div class="content-card">
                        <div class="mb-2">
                            <span class="text-secondary small">在 </span>
                            <a href="/post-detail?id=${c.postId}" class="text-decoration-none fw-bold" style="color:var(--apple-blue)">${c.postTitle}</a>
                            <span class="text-secondary small"> 下评论：</span>
                        </div>
                        <div class="mb-2">${c.content}</div>
                        <div class="text-secondary small">${c.createdAt}</div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<div class="text-center text-muted py-5">暂无发表的评论</div>';
            }
        } catch (e) { console.error(e); }
    };

    // Edit logic
    const editBtn = document.getElementById('editBtn');
    const saveCancelGroup = document.getElementById('saveCancelGroup');
    const displayMode = document.getElementById('displayMode');
    const editMode = document.getElementById('editMode');
    const avatarLabel = document.getElementById('avatarLabel');

    editBtn.onclick = () => {
        editBtn.classList.add('d-none');
        saveCancelGroup.classList.remove('d-none');
        displayMode.classList.add('d-none');
        editMode.classList.remove('d-none');
        avatarLabel.style.display = 'block';
    };

    const exitEdit = () => {
        editBtn.classList.remove('d-none');
        saveCancelGroup.classList.add('d-none');
        displayMode.classList.remove('d-none');
        editMode.classList.add('d-none');
        avatarLabel.style.display = 'none';
        renderProfile();
    };

    document.getElementById('cancelBtn').onclick = exitEdit;

    document.getElementById('saveBtn').onclick = async () => {
        const newName = document.getElementById('userNameInput').value.trim();
        const newSig = document.getElementById('userSignatureInput').value.trim();
        const avatarImg = document.getElementById('userAvatar').src;

        try {
            const res = await fetch('/user/profile/update', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `${tokenType} ${token}`
                },
                body: JSON.stringify({
                    username: newName,
                    signature: newSig,
                    avatar: avatarImg.startsWith('data:') ? null : avatarImg
                })
            });
            const result = await res.json();
            if (result.code === 200) {
                const data = result.data;
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('tokenType', data.tokenType || 'Bearer');
                    localStorage.setItem('username', data.username || newName);
                } else if (newName !== currentUserData.username) {
                    localStorage.setItem('username', newName);
                }
                currentUserData = data.user || data;
                exitEdit();
                loadUserPosts();
                loadUserComments();
            } else {
                alert(result.message);
            }
        } catch (e) { console.error(e); }
    };

    // Avatar upload (simple, no crop)
    document.getElementById('avatarInput').onchange = async (e) => {
        const f = e.target.files[0];
        if (!f) return;
        if (!f.type.startsWith('image/')) { alert('请选择图片文件'); return; }
        e.target.value = '';

        const avatarImg = document.getElementById('userAvatar');
        const avatarLabel = document.getElementById('avatarLabel');
        const origSrc = avatarImg.src;

        avatarLabel.textContent = '上传中...';
        avatarLabel.style.pointerEvents = 'none';

        const fd = new FormData();
        fd.append('image', f);

        try {
            const res = await fetch('/user/profile/avatar', {
                method: 'POST',
                headers: { 'Authorization': `${tokenType} ${token}` },
                body: fd
            });
            const result = await res.json();
            if (result.code === 200) {
                avatarImg.src = result.data;
                avatarLabel.textContent = '更换头像';
            } else {
                alert(result.message || '头像上传失败');
                avatarImg.src = origSrc;
            }
        } catch (err) {
            console.error(err);
            alert('网络错误，头像上传失败');
            avatarImg.src = origSrc;
        } finally {
            avatarLabel.style.pointerEvents = '';
        }
    };

    // Lightbox - click avatar to view large
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    document.getElementById('userAvatar').onclick = () => {
        if (document.getElementById('avatarLabel').style.display === 'block') return;
        lightboxImg.src = document.getElementById('userAvatar').src;
        lightbox.classList.add('show');
    };
    lightbox.onclick = () => { lightbox.classList.remove('show'); };

    // Tabs logic
    document.querySelectorAll('.tab-item').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const target = tab.dataset.tab;
            document.getElementById('postsList').classList.add('d-none');
            document.getElementById('commentsList').classList.add('d-none');
            document.getElementById('targetsList').classList.add('d-none');
            if (target === 'posts') {
                document.getElementById('postsList').classList.remove('d-none');
            } else if (target === 'comments') {
                document.getElementById('commentsList').classList.remove('d-none');
            } else if (target === 'targets') {
                document.getElementById('targetsList').classList.remove('d-none');
            }
        };
    });

    const loadUserReviewTargets = async () => {
        try {
            const res = await fetch('/post/user/review-targets', {
                headers: { 'Authorization': `${tokenType} ${token}` }
            });
            const result = await res.json();
            const list = document.getElementById('targetsList');
            if (result.code === 200 && result.data.length) {
                list.innerHTML = result.data.map(t => `
                    <div class="content-card" onclick="location.href='/review-target-detail?id=${t.id}'" style="cursor:pointer">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <div>
                                <h5 class="fw-bold m-0">${t.targetName}</h5>
                                <span class="text-secondary small">来自 </span>
                                <a href="/post-detail?id=${t.postId}" class="text-decoration-none" style="color:var(--apple-blue)" onclick="event.stopPropagation()">${t.postTitle}</a>
                            </div>
                            ${t.avgScore != null && t.avgScore !== '' ? `<div class="score-badge">★ ${Number(t.avgScore).toFixed(1)}</div>` : '<div class="text-muted small" style="background:#f0f0f2;border-radius:8px;padding:2px 8px;font-size:0.85rem;">暂未评分</div>'}
                        </div>
                        <div class="text-secondary small">我评论了 ${t.commentCount} 次</div>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<div class="text-center text-muted py-5">暂无评论过的对象</div>';
            }
        } catch (e) { console.error(e); }
    };

    loadProfile();
    loadUserPosts();
    loadUserComments();
    loadUserReviewTargets();
  })();
</script>
</body>
</html>
