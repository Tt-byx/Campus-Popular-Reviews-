<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>帖子分类 - 校圈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-text: #1d1d1f;
            --apple-secondary: #86868b;
            --apple-blue: #0066cc;
            --apple-radius: 18px;
            --apple-shadow: 0 8px 30px rgba(0,0,0,0.04);
        }
        body {
            background: var(--apple-bg);
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .wrap { max-width: 920px; margin: 40px auto; padding: 0 20px; }

        .category-tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 40px;
        }

        .category-tab {
            position: relative;
            padding: 24px 20px;
            border: 2px solid transparent;
            border-radius: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
            color: var(--apple-text);
            overflow: hidden;
        }

        .category-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0,102,204,0.1) 0%, rgba(0,102,204,0.05) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .category-tab:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,102,204,0.15);
            border-color: rgba(0,102,204,0.3);
        }

        .category-tab:hover::before {
            opacity: 1;
        }

        .category-tab.active {
            background: linear-gradient(135deg, #0066cc 0%, #0052a3 100%);
            color: white;
            border-color: #0066cc;
            box-shadow: 0 8px 30px rgba(0,102,204,0.3);
            transform: translateY(-2px);
        }

        .category-tab.active::before {
            display: none;
        }

        .category-tab .icon {
            font-size: 2rem;
            margin-bottom: 10px;
            display: block;
            transition: transform 0.3s ease;
        }

        .category-tab:hover .icon {
            transform: scale(1.1);
        }

        .category-tab .label {
            position: relative;
            z-index: 1;
        }

        .post-card {
            border: none;
            border-radius: var(--apple-radius);
            background: var(--apple-card);
            box-shadow: var(--apple-shadow);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            margin-bottom: 20px;
        }
        .post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
        }
        .post-title { font-weight: 600; font-size: 1.25rem; letter-spacing: -0.01em; }
        .meta { color: var(--apple-secondary); font-size: 0.85rem; }
        .content { color: #333; line-height: 1.5; margin-top: 12px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

        .post-image-wrapper {
            margin-top: 16px;
            border-radius: 14px;
            overflow: hidden;
            background: #f0f0f2;
        }
        .post-image-wrapper img {
            width: 100%;
            height: auto;
            max-height: 320px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .post-card:hover .post-image-wrapper img {
            transform: scale(1.02);
        }

        .badge-apple {
            background: linear-gradient(135deg, #f0f0f2 0%, #e8e8ed 100%);
            color: #666;
            font-weight: 500;
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.75rem;
            border: none;
        }

        .back-btn {
            border-radius: 20px;
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 2px solid #e0e0e0;
        }

        .back-btn:hover {
            background: #f5f5f7;
            border-color: #0066cc;
            color: #0066cc;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--apple-secondary);
        }
        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 24px;
            opacity: 0.2;
        }

        @media (max-width: 768px) {
            .category-tabs {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .category-tab {
                padding: 20px 16px;
            }

            .category-tab .icon {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 m-0 fw-bold">帖子分类</h1>
            <p class="text-secondary small m-0">浏览不同类别的校园动态</p>
        </div>
        <button class="btn btn-outline-secondary back-btn" onclick="location.href='/browse-post'">
            ← 返回广场
        </button>
    </div>

    <div class="category-tabs">
        <button class="category-tab active" data-tag="食堂" onclick="selectCategory(this)">
            <span class="icon">🍜</span>
            <span class="label">食堂</span>
        </button>
        <button class="category-tab" data-tag="课程" onclick="selectCategory(this)">
            <span class="icon">📚</span>
            <span class="label">课程</span>
        </button>
        <button class="category-tab" data-tag="社团" onclick="selectCategory(this)">
            <span class="icon">🎭</span>
            <span class="label">社团</span>
        </button>
        <button class="category-tab" data-tag="活动" onclick="selectCategory(this)">
            <span class="icon">🎉</span>
            <span class="label">活动</span>
        </button>
        <button class="category-tab" data-tag="其他" onclick="selectCategory(this)">
            <span class="icon">✨</span>
            <span class="label">其他</span>
        </button>
    </div>

    <div id="list" class="d-grid"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentTag = '食堂';

    const selectCategory = (element) => {
        document.querySelectorAll('.category-tab').forEach(tab => tab.classList.remove('active'));
        element.classList.add('active');
        currentTag = element.dataset.tag;
        loadPosts(currentTag);
    };

    const renderList = (items) => {
        const list = document.getElementById('list');
        if (!items || !items.length) {
            list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <div class="h5">暂无${currentTag}分类的帖子</div>
          <p class="small mt-2">去看看其他分类吧～</p>
        </div>
      `;
            return;
        }
        list.innerHTML = items.map(item => `
      <div class="card post-card" onclick="location.href='/post-detail?id=${item.id}'">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-start">
            <div class="post-title">${item.title}</div>
            ${item.tag ? `<span class="badge badge-apple">#${item.tag}</span>` : ''}
          </div>
          <div class="meta mt-1">作者：${item.username || '未知'} · ${item.createdAt || ''}</div>
          ${item.imageUrl ? `<div class="post-image-wrapper"><img src="${item.imageUrl}" alt="${item.title}" loading="lazy"></div>` : ''}
          <div class="content">${item.content}</div>
        </div>
      </div>
    `).join('');
    };

    const loadPosts = async (tag) => {
        try {
            const res = await fetch(`/post/list/by-tag?tag=${encodeURIComponent(tag)}`);
            const result = await res.json();
            if (result.code === 200) {
                renderList(result.data);
            }
        } catch (e) {
            console.error('加载帖子失败:', e);
        }
    };

    // 初始加载
    loadPosts(currentTag);
</script>
</body>
</html>
