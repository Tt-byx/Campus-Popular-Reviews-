<!doctype html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>设置 - 校圈</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link th:href="@{/css/app.css}" rel="stylesheet" />
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font); }
    .settings-section { margin-bottom: 28px; }
    .settings-section-title { font-size: 0.8rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; padding-left: 4px; }
    .settings-item { display: flex; align-items: center; gap: 14px; padding: 14px 0; border-bottom: 1px solid var(--border); cursor: pointer; transition: all 0.2s; }
    .settings-item:last-child { border-bottom: none; }
    .settings-item:hover .settings-item-label { color: var(--sapphire); }
    .settings-item-icon { width: 20px; height: 20px; color: var(--text-secondary); flex-shrink: 0; }
    .settings-item-label { flex: 1; font-weight: 500; color: var(--slate); transition: color 0.2s; }
    .settings-item-arrow { width: 16px; height: 16px; color: var(--gray-300); }
    .btn-logout-page { width: 100%; padding: 12px; border-radius: var(--radius-lg); border: 1px solid var(--border); background: var(--card); color: var(--red); font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
    .btn-logout-page:hover { background: #FEF2F2; border-color: var(--red); }
    .btn-danger-page { width: 100%; padding: 12px; border-radius: var(--radius-lg); border: 1px solid var(--red); background: var(--card); color: var(--red); font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; }
    .btn-danger-page:hover { background: #FEF2F2; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 0.9rem; font-weight: 500; text-decoration: none; padding: 6px 14px; border-radius: var(--radius-full); transition: all 0.2s; }
    .back-link:hover { color: var(--sapphire); background: rgba(37, 99, 235, 0.06); text-decoration: none; }
  </style>
</head>
<body>
<div class="bento-container">
  <aside class="bento-sidebar" id="mainSidebar">
    <div class="bento-card sidebar-profile-card">
      <div class="sidebar-avatar" id="sidebarAvatar">U</div>
      <div class="sidebar-username" id="sidebarUsername">用户</div>
      <div class="sidebar-bio" id="sidebarBio">分享校园生活</div>
    </div>
    <div class="bento-card sidebar-nav">
      <button class="sidebar-nav-item" onclick="location.href='/browse-post'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/categories'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>分类
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/ranking'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>排行
      </button>
      <button class="sidebar-nav-item" id="adminNavBtn" style="display:none" onclick="location.href='/admin'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>管理
      </button>
      <button class="sidebar-nav-item" onclick="location.href='/profile'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>个人中心
      </button>
      <button class="sidebar-nav-item active" onclick="location.href='/settings'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>设置
      </button>
    </div>
    <div class="bento-card bento-card-sm" id="sidebarLoginArea" style="display:none">
      <div class="bento-card-body text-center">
        <p class="text-secondary text-sm m-0">登录以解锁全部功能</p>
        <div class="flex gap-2 justify-center mt-3">
          <button class="btn btn-primary btn-sm" onclick="showLoginPrompt()">登录</button>
          <button class="btn btn-secondary btn-sm" onclick="showRegisterPrompt()">注册</button>
        </div>
      </div>
    </div>
  </aside>

  <script>
    (function(){
      var u = localStorage.getItem('username');
      if (u) {
        document.getElementById('sidebarUsername').textContent = u;
        document.getElementById('sidebarAvatar').textContent = u.charAt(0).toUpperCase();
        document.getElementById('sidebarBio').textContent = '';
        document.getElementById('sidebarLoginArea').style.display = 'none';
        document.getElementById('sidebarLogoutBtn').style.display = 'flex';
        var r = localStorage.getItem('role') || 'user';
        if (r === 'admin' || r === 'super_admin') {
          var ab = document.getElementById('adminNavBtn');
          if (ab) ab.style.display = 'flex';
        }
      } else {
        document.getElementById('sidebarLoginArea').style.display = 'block';
        document.getElementById('sidebarLogoutBtn').style.display = 'none';
      }
    })();
  </script>

  <main class="bento-main">
    <div class="mb-4">
      <a href="/browse-post" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg> 返回广场
      </a>
    </div>

    <div class="bento-card" style="padding:32px">
      <div class="settings-section">
        <div class="settings-section-title">账户管理</div>
        <div class="settings-item" onclick="showAbout()">
          <svg class="settings-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
          <span class="settings-item-label">关于校圈</span>
          <svg class="settings-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        <div class="settings-item" onclick="clearCache()">
          <svg class="settings-item-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          <span class="settings-item-label">清理缓存</span>
          <svg class="settings-item-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>

      <hr class="my-4" style="border-color:var(--border);margin:24px 0">

      <button class="btn-logout-page mb-3" onclick="handleLogout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;vertical-align:middle"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>退出登录
      </button>
      <div style="margin-top:20px">
        <div class="settings-section-title" style="color:var(--red);margin-bottom:10px">危险区域</div>
        <button class="btn-danger-page" onclick="deactivateAccount()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px;vertical-align:middle"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>注销账号
        </button>
      </div>
    </div>
  </main>
</div>

<script>
  (() => {
    document.querySelectorAll('.sidebar-nav-item').forEach(item => {
      const orig = item.getAttribute('onclick');
      if (!orig || !orig.includes('location.href')) return;
      item.removeAttribute('onclick');
      item.addEventListener('click', function(e) {
        e.preventDefault();
        const match = orig.match(/location\.href=['"]([^'"]+)['"]/);
        if (!match) return;
        document.body.classList.add('page-transitioning');
        setTimeout(() => { location.href = match[1]; }, 120);
      });
    });

    const token = localStorage.getItem('token');
    const tokenType = localStorage.getItem('tokenType') || 'Bearer';
    const username = localStorage.getItem('username');

    if (!token) {
      localStorage.setItem('showLoginMsg', '请先登录后再访问设置');
      location.href = '/browse-post';
      return;
    }

    const initSidebar = async () => {
      const sidebarLoginArea = document.getElementById('sidebarLoginArea');
      const adminNavBtn = document.getElementById('adminNavBtn');
      const sidebarAvatar = document.getElementById('sidebarAvatar');
      const sidebarUsername = document.getElementById('sidebarUsername');
      const sidebarBio = document.getElementById('sidebarBio');

      sidebarLoginArea.style.display = 'none';

      const role = localStorage.getItem('role') || 'user';
      if (role === 'admin' || role === 'super_admin') {
        adminNavBtn.style.display = 'flex';
      }

      sidebarUsername.textContent = username;
      try {
        const res = await fetch('/user/profile', {
          headers: { 'Authorization': `${tokenType} ${token}` }
        });
        const result = await res.json();
        if (result.code === 200 && result.data) {
          const data = result.data;
          if (data.avatar) {
            sidebarAvatar.innerHTML = `<img src="${data.avatar}" alt="">`;
          } else {
            sidebarAvatar.textContent = (data.username || username).charAt(0).toUpperCase();
          }
          sidebarUsername.textContent = data.username || username;
          sidebarBio.textContent = data.signature || '';
        }
      } catch(e) {
        sidebarAvatar.textContent = username.charAt(0).toUpperCase();
      }
    };

    window.handleLogout = () => {
      if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('token');
        localStorage.removeItem('tokenType');
        localStorage.removeItem('username');
        localStorage.removeItem('role');
        location.href = '/browse-post';
      }
    };

    window.showAbout = () => { alert('校圈 - 校园生活分享平台\n版本 1.0.0'); };
    window.clearCache = () => { alert('缓存已清理'); };

    window.deactivateAccount = async () => {
      if (!confirm('确定要注销账号吗？注销后账号将无法使用，所有数据将被清除。此操作不可恢复！')) return;
      if (!confirm('再次确认：您确定要注销账号吗？')) return;
      try {
        const res = await fetch('/user/account', {
          method: 'DELETE',
          headers: { 'Authorization': `${tokenType} ${token}` }
        });
        const result = await res.json();
        if (result.code === 200) {
          alert('账号已注销');
          localStorage.clear();
          location.href = '/browse-post';
        } else {
          alert(result.message || '注销失败');
        }
      } catch (e) { console.error(e); alert('网络错误'); }
    };

    initSidebar();
  })();
</script>
</body>
</html>
